<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spatial Portal Studio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: 'Inter', sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        video { display: none; }

        /* ── Modern Glassmorphism HUD ── */
        .glass-panel {
            background: rgba(20, 20, 20, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: #fff;
        }

        #hud-top {
            position: absolute; top: 24px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 12px 32px; z-index: 20; pointer-events: none;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        #hud-title {
            font-weight: 600; font-size: 14px; letter-spacing: 1px;
            color: rgba(255,255,255,0.9);
        }
        #status {
            font-size: 11px; font-weight: 300; letter-spacing: 0.5px;
            color: rgba(255,255,255,0.6); margin-top: 4px; transition: color 0.3s;
        }
        #status.active  { color: #4ade80; }
        #status.capture { color: #60a5fa; }
        #status.locked  { color: #facc15; }
        #status.error   { color: #f87171; }

        /* ── Sleek Filter Dock ── */
        #ui-dock {
            position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px; align-items: center; z-index: 20;
            padding: 8px; border-radius: 30px;
        }
        .filter-btn {
            background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.7);
            border: 1px solid transparent; padding: 10px 20px; border-radius: 24px;
            cursor: pointer; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 400;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .filter-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
        .filter-btn.active {
            background: rgba(255,255,255,0.9); color: #000;
            border-color: rgba(255,255,255,1); box-shadow: 0 4px 16px rgba(255,255,255,0.2);
            font-weight: 600;
        }

        /* ── Intensity Slider ── */
        #fx-controls {
            position: absolute; right: 32px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 16px;
            padding: 24px 12px; z-index: 20;
        }
        #fx-controls label { 
            font-size: 10px; font-weight: 600; letter-spacing: 1px; color: rgba(255,255,255,0.6); 
            text-transform: uppercase; writing-mode: vertical-lr; transform: rotate(180deg); 
        }
        input[type=range] { 
            -webkit-appearance: none; appearance: none; writing-mode: vertical-lr; direction: rtl; 
            width: 4px; height: 140px; background: rgba(255,255,255,0.2); border-radius: 4px; outline: none; 
        }
        input[type=range]::-webkit-slider-thumb { 
            -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; 
            background: white; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.3); transition: transform 0.2s;
        }
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }

        /* ── Minimalist Gesture Ring ── */
        #gesture-hud {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 30;
        }
        #lock-ring {
            width: 80px; height: 80px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.3s, transform 0.3s;
            transform: scale(0.8);
        }
        #lock-ring.visible { opacity: 1; transform: scale(1); }
        #lock-ring svg { width: 80px; height: 80px; position: absolute; top: 0; left: 0; }
        #lock-ring-label {
            font-size: 10px; font-weight: 600; letter-spacing: 1px;
            color: white; text-align: center; position: absolute; bottom: -28px;
            white-space: nowrap; left: 50%; transform: translateX(-50%);
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* ── Flash & Capture UI ── */
        #flash {
            position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; 
            z-index: 100; transition: opacity 0.1s ease-out;
        }
        #flash.pop { opacity: 0.9; }
        #capture-badge {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            font-weight: 300; font-size: 40px; color: white; 
            pointer-events: none; z-index: 50; opacity: 0;
            background: rgba(0,0,0,0.3); padding: 20px; border-radius: 50%; backdrop-filter: blur(10px);
        }
        #capture-badge.show { animation: badgePop 0.6s cubic-bezier(0.2,1.2,0.3,1) forwards; }
        @keyframes badgePop {
            0%   { opacity:1; transform:translate(-50%,-50%) scale(0.5); }
            50%  { opacity:1; transform:translate(-50%,-50%) scale(1.1); }
            100% { opacity:0; transform:translate(-50%,-50%) scale(1); }
        }

        /* ── Refined Gallery ── */
        #gallery {
            position: absolute; left: 24px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 12px; z-index: 25;
            max-height: 80vh; overflow: visible;
        }
        .photo-card {
            position: relative; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 8px;
            padding: 4px 4px 24px 4px; backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); cursor: pointer;
            animation: photoAppear 0.5s cubic-bezier(0.2,1.2,0.3,1) forwards;
            transition: all 0.3s;
        }
        @keyframes photoAppear {
            from { transform: translateX(-50px) scale(0.8); opacity:0; }
            to   { transform: translateX(0) scale(1); opacity:1; }
        }
        .photo-card:hover { transform: scale(1.05) translateX(10px); border-color: rgba(255,255,255,0.6); z-index: 30; }
        .photo-card img { display: block; width: 120px; height: auto; border-radius: 4px; }
        .photo-meta {
            position: absolute; bottom: 6px; left: 8px; right: 8px;
            font-size: 9px; color: rgba(255,255,255,0.7); display: flex; justify-content: space-between;
        }
        .photo-card.deleting {
            animation: photoDelete 0.4s cubic-bezier(0.5,0,1,0.5) forwards !important; pointer-events: none;
        }
        @keyframes photoDelete {
            0%   { transform: scale(1); opacity: 1; filter: blur(0px); }
            100% { transform: scale(0.5) translateY(50px); opacity: 0; filter: blur(10px); }
        }

        /* ── Gesture Legend ── */
        #gesture-legend {
            position: absolute; top: 24px; right: 24px; display: flex; flex-direction: column; gap: 8px;
            padding: 16px; z-index: 20; pointer-events: none;
        }
        .gl-item {
            display: flex; align-items: center; gap: 10px; font-size: 10px; color: rgba(255,255,255,0.6);
        }
        .gl-icon { font-size: 14px; opacity: 0.8; }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
</head>
<body>

<video id="webcam" autoplay playsinline></video>
<div id="flash"></div>
<div id="capture-badge">📸</div>

<div id="hud-top" class="glass-panel">
    <div id="hud-title">SPATIAL STUDIO</div>
    <div id="status">Waking AI Vision...</div>
</div>

<div id="gesture-legend" class="glass-panel">
    <div class="gl-item"><span class="gl-icon">🤏</span> Pinch to create portal</div>
    <div class="gl-item"><span class="gl-icon">👐</span> Two hands to expand</div>
    <div class="gl-item"><span class="gl-icon">🛑</span> Hold still to capture</div>
    <div class="gl-item"><span class="gl-icon">✊</span> Fist over photo to delete</div>
</div>

<div id="gesture-hud">
    <div id="lock-ring">
        <svg viewBox="0 0 80 80">
            <circle cx="40" cy="40" r="36" fill="rgba(0,0,0,0.3)" stroke="rgba(255,255,255,0.1)" stroke-width="4"/>
            <circle id="lock-progress" cx="40" cy="40" r="36" fill="none" stroke="#ffffff" stroke-width="4"
                    stroke-dasharray="226.2" stroke-dashoffset="226.2" stroke-linecap="round" transform="rotate(-90 40 40)"
                    style="transition: stroke-dashoffset 0.1s linear, stroke 0.3s;"/>
            <circle id="lock-center" cx="40" cy="40" r="4" fill="white" />
        </svg>
        <div id="lock-ring-label">FOCUS</div>
    </div>
</div>

<div id="fx-controls" class="glass-panel">
    <label>Effect Depth</label>
    <input type="range" id="intensity" min="0" max="100" value="80">
</div>

<div id="ui-dock" class="glass-panel">
    <button class="filter-btn active" data-filter="0">Frosted</button>
    <button class="filter-btn" data-filter="1">Cyber</button>
    <button class="filter-btn" data-filter="2">Thermal HD</button>
    <button class="filter-btn" data-filter="3">Night Ops</button>
    <button class="filter-btn" data-filter="4">Sketch</button>
    <button class="filter-btn" data-filter="5">Halftone</button>
    <button class="filter-btn" data-filter="6">Refract</button>
    <button class="filter-btn" data-filter="7">Vapor</button>
</div>

<div id="gallery"></div>

<script>
// ════════════════════════════════════════════
//  1. THREE.JS SETUP
// ════════════════════════════════════════════
let aspect = window.innerWidth / window.innerHeight;
const scene  = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-aspect, aspect, 1, -1, 0.1, 100);
camera.position.z = 1;

const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // optimize for hi-res displays
document.body.appendChild(renderer.domElement);

const videoEl  = document.getElementById('webcam');
const videoTex = new THREE.VideoTexture(videoEl);
videoTex.minFilter = THREE.LinearFilter;
videoTex.magFilter = THREE.LinearFilter;
videoTex.format    = THREE.RGBAFormat;

const bgGeo  = new THREE.PlaneGeometry(aspect * 2, 2);
const bgMat  = new THREE.MeshBasicMaterial({ map: videoTex });
const bgMesh = new THREE.Mesh(bgGeo, bgMat);
bgMesh.scale.x = -1; // mirror background
scene.add(bgMesh);

// ════════════════════════════════════════════
//  2. FULLY CUSTOMISED SHADERS
// ════════════════════════════════════════════
const vertexShader = `
    varying vec2 vUv;
    varying vec2 vScreen;
    void main(){
        vUv = uv;
        vec4 sp = projectionMatrix * modelViewMatrix * vec4(position,1.0);
        vScreen = sp.xy/sp.w*0.5+0.5;
        gl_Position = sp;
    }
`;

const fragmentShader = `
    precision highp float;
    uniform sampler2D tDiffuse;
    uniform int   uFilter;
    uniform float uTime;
    uniform float uIntensity;
    uniform float uLocked;
    varying vec2 vUv;
    varying vec2 vScreen;

    // Utility functions
    float luma(vec3 c){ return dot(c,vec3(0.299,0.587,0.114)); }
    float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }

    void main() {
        vec2 sp = vec2(1.0 - vScreen.x, vScreen.y); // mirror camera mapping
        vec4 baseColor = texture2D(tDiffuse, sp);
        vec3 col = baseColor.rgb;
        float l = luma(col);

        if (uFilter == 0) {
            // Frosted Glass (Chromatic Aberration + Grain + Brighten)
            float o = 0.008 * uIntensity;
            col.r = texture2D(tDiffuse, sp + vec2(o, 0.0)).r;
            col.g = texture2D(tDiffuse, sp).g;
            col.b = texture2D(tDiffuse, sp - vec2(o, 0.0)).b;
            col += (hash(sp * 400.0 + uTime) - 0.5) * 0.15 * uIntensity;
            col *= 1.1 + (uIntensity * 0.2); 
        } 
        else if (uFilter == 1) {
            // Cyberpunk (Neon Dual-Tone)
            vec3 shadow = vec3(0.05, 0.0, 0.2);
            vec3 mid = vec3(0.9, 0.1, 0.6); // Hot Pink
            vec3 highlight = vec3(0.0, 0.9, 0.9); // Cyan
            vec3 graded = mix(shadow, mid, smoothstep(0.0, 0.4, l));
            graded = mix(graded, highlight, smoothstep(0.4, 1.0, l));
            col = mix(col, graded, uIntensity);
        } 
        else if (uFilter == 2) {
            // Thermal HD (Smooth FLIR)
            vec3 c1 = vec3(0.0, 0.0, 0.4); 
            vec3 c2 = vec3(0.6, 0.0, 0.6);
            vec3 c3 = vec3(1.0, 0.3, 0.0);
            vec3 c4 = vec3(1.0, 1.0, 0.8);
            float t = clamp(l + (hash(sp*200.+uTime)*0.02), 0.0, 1.0);
            vec3 therm;
            if(t < 0.33) therm = mix(c1, c2, t/0.33);
            else if(t < 0.66) therm = mix(c2, c3, (t-0.33)/0.33);
            else therm = mix(c3, c4, (t-0.66)/0.34);
            col = mix(col, therm, uIntensity);
        } 
        else if (uFilter == 3) {
            // Night Ops (Phosphor + Scanlines)
            vec3 nv = col * vec3(0.2, 1.0, 0.3);
            nv += (hash(sp * 600.0 + uTime) - 0.5) * 0.3 * uIntensity;
            float lines = sin(sp.y * 900.0) * 0.05 * uIntensity;
            nv -= lines;
            nv *= 1.0 + (uIntensity * 0.8);
            col = mix(col, nv, uIntensity);
        } 
        else if (uFilter == 4) {
            // Ink Sketch (Sobel Edge + Paper Texture)
            float o = 0.0015 * uIntensity;
            float gx = luma(texture2D(tDiffuse, sp+vec2(o,0)).rgb) - luma(texture2D(tDiffuse, sp-vec2(o,0)).rgb);
            float gy = luma(texture2D(tDiffuse, sp+vec2(0,o)).rgb) - luma(texture2D(tDiffuse, sp-vec2(0,o)).rgb);
            float edge = length(vec2(gx, gy)) * 6.0;
            vec3 sketch = vec3(1.0 - edge);
            sketch *= vec3(0.96, 0.94, 0.89); // paper tint
            col = mix(col, sketch, uIntensity);
        } 
        else if (uFilter == 5) {
            // Halftone Matrix
            float grids = 160.0 - (uIntensity * 120.0);
            vec2 qUv = floor(sp * grids) / grids;
            vec2 fractUv = fract(sp * grids);
            float qL = luma(texture2D(tDiffuse, qUv).rgb);
            float radius = qL * 0.7;
            float dist = distance(fractUv, vec2(0.5));
            vec3 halfT = (dist < radius) ? vec3(0.9) : vec3(0.1);
            col = mix(col, halfT, uIntensity);
        } 
        else if (uFilter == 6) {
            // Refract / Water Ripple
            vec2 center = vec2(0.5);
            float dist = distance(vUv, center);
            vec2 offset = normalize(vUv - center) * sin(dist * 40.0 - uTime * 6.0) * 0.04 * uIntensity;
            col = texture2D(tDiffuse, sp + offset).rgb;
        } 
        else if (uFilter == 7) {
            // Vaporwave (Sunset Gradient + Grid)
            float o = 0.01 * uIntensity;
            vec3 vcol;
            vcol.r = texture2D(tDiffuse, sp + vec2(o, o)).r;
            vcol.g = texture2D(tDiffuse, sp).g;
            vcol.b = texture2D(tDiffuse, sp - vec2(o, o)).b;
            vec3 sunset = mix(vec3(1.0, 0.1, 0.5), vec3(1.0, 0.6, 0.1), sp.y);
            vcol *= sunset * 1.5;
            if (fract(sp.y * 25.0 + uTime * 0.2) < 0.08 * uIntensity) {
                vcol += vec3(0.0, 0.8, 1.0); // grid
            }
            col = mix(col, vcol, uIntensity);
        }

        // ── Clean Glass Rim ──
        float edgeDist = min(min(vUv.x, 1.0-vUv.x), min(vUv.y, 1.0-vUv.y));
        float rimGlow = smoothstep(0.0, 0.06, edgeDist);
        float intensity = (1.0 - rimGlow);
        
        if (uLocked > 0.5) {
            // Capture locking pulse
            float pulse = sin(uTime * 12.0) * 0.5 + 0.5;
            col += mix(vec3(1.0), vec3(0.5, 0.9, 1.0), pulse) * intensity * 1.5;
        } else {
            // Standard frosted rim
            col += vec3(1.0) * intensity * 0.4;
        }
        
        gl_FragColor = vec4(col, 1.0);
    }
`;

const fgMat = new THREE.ShaderMaterial({
    uniforms: {
        tDiffuse:   { value: videoTex },
        uFilter:    { value: 0 },
        uTime:      { value: 0.0 },
        uIntensity: { value: 0.8 },
        uLocked:    { value: 0.0 }
    },
    vertexShader, fragmentShader,
    transparent: true, depthWrite: false
});

const portalMesh = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), fgMat);
portalMesh.visible = false;
portalMesh.position.z = 0.1;
scene.add(portalMesh);

// ════════════════════════════════════════════
//  3. DOM REFS & UI INTERACTIONS
// ════════════════════════════════════════════
const statusEl   = document.getElementById('status');
const flashEl    = document.getElementById('flash');
const badgeEl    = document.getElementById('capture-badge');
const galleryEl  = document.getElementById('gallery');
const lockRingEl = document.getElementById('lock-ring');
const lockProgEl = document.getElementById('lock-progress');
const lockLabel  = document.getElementById('lock-ring-label');
const lockCenter = document.getElementById('lock-center');
const gestureHud = document.getElementById('gesture-hud');
const CIRC       = 226.2; // 2π × 36

const FILTER_NAMES = ['Frosted Glass', 'Cyberpunk', 'Thermal HD', 'Night Ops', 'Ink Sketch', 'Halftone', 'Refraction', 'Vaporwave'];

document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', e => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        e.currentTarget.classList.add('active');
        fgMat.uniforms.uFilter.value = parseInt(e.currentTarget.dataset.filter);
    });
});

document.getElementById('intensity').addEventListener('input', e => {
    fgMat.uniforms.uIntensity.value = e.target.value / 100;
});

// ════════════════════════════════════════════
//  4. CAPTURE LOGIC
// ════════════════════════════════════════════
const HOLD_MS     = 1500;
const MIN_SIZE    = 0.3;   
const MOVE_THRESH = 0.03;

let captureState = 'idle';
let chargeStart  = 0;
let lastCx = 0, lastCy = 0;
let portalScrX = 0, portalScrY = 0, portalPxW = 0, portalPxH = 0;
let photoCount = 0;

function setProgress(t) {
    lockProgEl.style.strokeDashoffset = CIRC * (1 - t);
}

function triggerCapture() {
    flashEl.classList.add('pop');
    setTimeout(() => flashEl.classList.remove('pop'), 120);
    
    badgeEl.classList.remove('show');
    void badgeEl.offsetWidth; 
    badgeEl.classList.add('show');

    requestAnimationFrame(() => {
        const gl  = renderer.getContext();
        const dpr = window.devicePixelRatio || 1;

        const left   = Math.round((portalScrX - portalPxW / 2) * dpr);
        const bottom = Math.round(gl.drawingBufferHeight - (portalScrY + portalPxH / 2) * dpr);
        const width  = Math.round(portalPxW * dpr);
        const height = Math.round(portalPxH * dpr);

        const cL = Math.max(0, left), cB = Math.max(0, bottom);
        const cW = Math.min(width, gl.drawingBufferWidth - cL);
        const cH = Math.min(height, gl.drawingBufferHeight - cB);
        if (cW <= 0 || cH <= 0) return;

        const pixels = new Uint8Array(cW * cH * 4);
        gl.readPixels(cL, cB, cW, cH, gl.RGBA, gl.UNSIGNED_BYTE, pixels);

        const offC = document.createElement('canvas');
        offC.width = cW; offC.height = cH;
        const ctx  = offC.getContext('2d');
        const img  = ctx.createImageData(cW, cH);
        for (let y = 0; y < cH; y++) {
            for (let x = 0; x < cW; x++) {
                const src = ((cH - 1 - y) * cW + x) * 4;
                const dst = (y * cW + x) * 4;
                img.data[dst]   = pixels[src];
                img.data[dst+1] = pixels[src+1];
                img.data[dst+2] = pixels[src+2];
                img.data[dst+3] = 255;
            }
        }
        ctx.putImageData(img, 0, 0);
        createPhotoCard(offC.toDataURL('image/png'));
    });
}

function createPhotoCard(dataUrl) {
    photoCount++;
    const filterName = FILTER_NAMES[fgMat.uniforms.uFilter.value];
    const card = document.createElement('div');
    card.className = 'photo-card';
    card.innerHTML = `
        <img src="${dataUrl}" alt="capture">
        <div class="photo-meta">
            <span>#${String(photoCount).padStart(2,'0')}</span>
            <span>${filterName}</span>
        </div>
    `;
    card.addEventListener('click', () => {
        const a = document.createElement('a');
        a.href = dataUrl;
        a.download = `spatial-capture-${photoCount}.png`;
        a.click();
    });

    galleryEl.insertBefore(card, galleryEl.firstChild);
    const all = galleryEl.querySelectorAll('.photo-card');
    if (all.length > 5) all[all.length - 1].remove(); // Keep max 5 in view
}

// ════════════════════════════════════════════
//  5. GESTURE HELPERS & MEDIAPIPE LOGIC
// ════════════════════════════════════════════
function extFingers(lms) {
    const tips = [8, 12, 16, 20], pips = [6, 10, 14, 18];
    let n = 0;
    for (let i = 0; i < 4; i++) if (lms[tips[i]].y < lms[pips[i]].y) n++;
    if (Math.abs(lms[4].x - lms[3].x) > 0.04) n++;
    return n;
}
const isFist = lms => extFingers(lms) <= 1;
const wMX = x => -(x - 0.5) * (aspect * 2);
const wMY = y => -(y - 0.5) * 2;

const smoothPos   = new THREE.Vector3();
const smoothScale = new THREE.Vector3(1, 1, 1);

function onResults(results) {
    const lms = results.multiHandLandmarks;

    if (!lms || lms.length === 0) {
        portalMesh.visible = false;
        if (captureState !== 'locked') {
            captureState = 'idle';
            fgMat.uniforms.uLocked.value = 0.0;
            lockRingEl.classList.remove('visible');
            setProgress(0);
        }
        statusEl.innerText = 'Tracking Active — Show Hands';
        statusEl.className = 'active';
        return;
    }

    portalMesh.visible = true;
    let lp, rp;
    if (lms.length >= 2) { lp = lms[0][8]; rp = lms[1][8]; } 
    else { lp = lms[0][4]; rp = lms[0][8]; }

    const x1 = wMX(lp.x), y1 = wMY(lp.y);
    const x2 = wMX(rp.x), y2 = wMY(rp.y);
    const cx = (x1 + x2) / 2, cy = (y1 + y2) / 2;
    const dist = Math.sqrt((x2-x1)**2 + (y2-y1)**2);
    const pw = dist * 1.5, ph = pw * 1.2; // Slightly taller aspect ratio for modern feel

    smoothPos.lerp(new THREE.Vector3(cx, cy, 0.1), 0.2);
    smoothScale.lerp(new THREE.Vector3(pw, ph, 1), 0.2);
    portalMesh.position.copy(smoothPos);
    portalMesh.scale.copy(smoothScale);

    // Screen mapping for UI
    portalScrX = ((smoothPos.x / aspect) * 0.5 + 0.5) * window.innerWidth;
    portalScrY = (1 - (smoothPos.y * 0.5 + 0.5)) * window.innerHeight;
    portalPxW  = (smoothScale.x / (aspect * 2)) * window.innerWidth;
    portalPxH  = (smoothScale.y / 2) * window.innerHeight;

    gestureHud.style.left = portalScrX + 'px';
    gestureHud.style.top  = portalScrY + 'px';

    // ── LOCKED STATE (Fist to delete) ──
    if (captureState === 'locked') {
        fgMat.uniforms.uLocked.value = 1.0;
        statusEl.innerText = 'System Locked — Make fist over photo to delete, or move to unlock';
        statusEl.className = 'locked';

        for (const hand of lms) {
            if (isFist(hand)) {
                const fx = (1 - hand[9].x) * window.innerWidth;
                const fy = hand[9].y * window.innerHeight;
                let deleted = false;
                galleryEl.querySelectorAll('.photo-card:not(.deleting)').forEach(card => {
                    const r = card.getBoundingClientRect();
                    if (Math.hypot(fx - (r.left + r.width/2), fy - (r.top + r.height/2)) < 100) {
                        card.classList.add('deleting');
                        card.addEventListener('animationend', () => card.remove(), { once: true });
                        deleted = true;
                    }
                });
                if (!deleted) {
                    captureState = 'idle';
                    fgMat.uniforms.uLocked.value = 0.0;
                    lockRingEl.classList.remove('visible');
                }
            }
        }
        return;
    }

    if (pw < MIN_SIZE) {
        captureState = 'idle';
        lockRingEl.classList.remove('visible');
        setProgress(0);
        statusEl.innerText = lms.length >= 2 ? 'Portal Active — Two Hands' : 'Portal Active — Pinch';
        statusEl.className = 'active';
        lastCx = cx; lastCy = cy;
        return;
    }

    const moved = Math.hypot(cx - lastCx, cy - lastCy);
    lastCx = cx; lastCy = cy;

    if (moved > MOVE_THRESH) {
        captureState = 'idle';
        chargeStart = 0;
        lockRingEl.classList.remove('visible');
        setProgress(0);
        statusEl.innerText = 'Hold Still to Capture';
        statusEl.className = 'capture';
        return;
    }

    if (captureState === 'idle') {
        captureState = 'charging';
        chargeStart  = performance.now();
        lockRingEl.classList.add('visible');
        lockLabel.textContent = 'FOCUSING';
        lockCenter.setAttribute('fill', 'white');
        lockProgEl.style.stroke = '#ffffff';
    }

    if (captureState === 'charging') {
        const t = Math.min((performance.now() - chargeStart) / HOLD_MS, 1.0);
        setProgress(t);
        statusEl.innerText = `Capturing... ${( (1-t)*HOLD_MS/1000 ).toFixed(1)}s`;
        
        if (t >= 1.0) {
            captureState = 'locked';
            fgMat.uniforms.uLocked.value = 1.0;
            lockLabel.textContent = 'SAVED';
            lockProgEl.style.stroke = '#4ade80';
            lockCenter.setAttribute('fill', '#4ade80');
            statusEl.innerText = 'Capture Successful';
            statusEl.className = 'active';
            triggerCapture();
        }
    }
}

// ════════════════════════════════════════════
//  6. MEDIAPIPE & RENDER LOOP
// ════════════════════════════════════════════
const handsMP = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
handsMP.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
handsMP.onResults(onResults);

const clock = new THREE.Clock();
const cam = new Camera(videoEl, {
    onFrame: async () => {
        fgMat.uniforms.uTime.value = clock.getElapsedTime();
        await handsMP.send({ image: videoEl });
        renderer.render(scene, camera);
    },
    width: 1280, height: 720
});
cam.start()
    .then(() => { statusEl.innerText = 'System Ready'; statusEl.className = 'active'; })
    .catch(() => { statusEl.innerText = 'Camera Error — Allow Access'; statusEl.className = 'error'; });

// ════════════════════════════════════════════
//  7. RESIZE HANDLING
// ════════════════════════════════════════════
window.addEventListener('resize', () => {
    aspect = window.innerWidth / window.innerHeight;
    camera.left = -aspect; camera.right = aspect;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    bgMesh.geometry.dispose();
    bgMesh.geometry = new THREE.PlaneGeometry(aspect * 2, 2);
});
</script>
</body>
</html>
