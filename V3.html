<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spatial Portal Filters</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: 'Space Mono', monospace; }
        canvas { display: block; width: 100vw; height: 100vh; }
        video { display: none; }

        /* ── HUD Header ── */
        #hud-header {
            position: absolute;
            top: 0; left: 0; right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.75), transparent);
            z-index: 20;
            pointer-events: none;
        }
        #hud-title {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 13px;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.85);
            text-transform: uppercase;
        }
        #hud-title span { color: #00f5ff; }

        #status {
            font-size: 10px;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
        }
        #status.active { color: #39ff14; }
        #status.error  { color: #ff3939; }

        /* ── Filter Carousel ── */
        #ui-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            align-items: center;
            z-index: 20;
        }

        .filter-btn {
            position: relative;
            background: rgba(0,0,0,0.5);
            color: rgba(255,255,255,0.65);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 9px 16px 8px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Space Mono', monospace;
            font-size: 9px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: all 0.25s ease;
            backdrop-filter: blur(12px);
            overflow: hidden;
        }
        .filter-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--accent, rgba(255,255,255,0.08));
            opacity: 0;
            transition: opacity 0.25s;
        }
        .filter-btn:hover { color: white; border-color: rgba(255,255,255,0.4); }
        .filter-btn:hover::before { opacity: 1; }
        .filter-btn.active {
            color: white;
            border-color: var(--active-border, #00f5ff);
            box-shadow: 0 0 16px var(--active-glow, rgba(0,245,255,0.35)),
                        inset 0 0 12px var(--active-glow, rgba(0,245,255,0.1));
        }
        .filter-btn.active::before { opacity: 1; }

        /* Per-filter accent colors */
        [data-filter="0"] { --accent: rgba(255,255,255,0.06); --active-border: rgba(255,255,255,0.6); --active-glow: rgba(255,255,255,0.2); }
        [data-filter="1"] { --accent: rgba(180,140,80,0.12); --active-border: #d4a843; --active-glow: rgba(212,168,67,0.4); }
        [data-filter="2"] { --accent: rgba(0,245,255,0.08); --active-border: #00f5ff; --active-glow: rgba(0,245,255,0.4); }
        [data-filter="3"] { --accent: rgba(255,60,180,0.1); --active-border: #ff3cb4; --active-glow: rgba(255,60,180,0.4); }
        [data-filter="4"] { --accent: rgba(57,255,20,0.08); --active-border: #39ff14; --active-glow: rgba(57,255,20,0.4); }
        [data-filter="5"] { --accent: rgba(255,100,0,0.1); --active-border: #ff6400; --active-glow: rgba(255,100,0,0.4); }
        [data-filter="6"] { --accent: rgba(100,80,255,0.1); --active-border: #7060ff; --active-glow: rgba(112,96,255,0.4); }
        [data-filter="7"] { --accent: rgba(255,220,0,0.08); --active-border: #ffd700; --active-glow: rgba(255,215,0,0.4); }

        .filter-label {
            display: block;
            font-size: 7px;
            letter-spacing: 1px;
            opacity: 0.5;
            margin-top: 2px;
        }

        /* ── Intensity Slider ── */
        #fx-controls {
            position: absolute;
            right: 24px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 20;
        }
        #fx-controls label {
            font-size: 8px;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            writing-mode: vertical-lr;
            transform: rotate(180deg);
        }
        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            writing-mode: vertical-lr;
            direction: rtl;
            width: 4px;
            height: 120px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px; height: 14px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(255,255,255,0.6);
        }

        /* ── Corner ornaments ── */
        .corner {
            position: absolute;
            width: 24px; height: 24px;
            z-index: 5;
            pointer-events: none;
        }
        .corner svg { width: 100%; height: 100%; }
        .corner.tl { top: 14px; left: 14px; }
        .corner.tr { top: 14px; right: 14px; transform: scaleX(-1); }
        .corner.bl { bottom: 14px; left: 14px; transform: scaleY(-1); }
        .corner.br { bottom: 14px; right: 14px; transform: scale(-1); }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
</head>
<body>

<video id="webcam" autoplay playsinline></video>

<!-- HUD Header -->
<div id="hud-header">
    <div id="hud-title">SPATIAL<span>PORTAL</span> / FX ENGINE</div>
    <div id="status">Loading AI Models…</div>
</div>

<!-- Corner ornaments -->
<div class="corner tl"><svg viewBox="0 0 24 24"><path d="M0 24 L0 0 L24 0" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/></svg></div>
<div class="corner tr"><svg viewBox="0 0 24 24"><path d="M0 24 L0 0 L24 0" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/></svg></div>
<div class="corner bl"><svg viewBox="0 0 24 24"><path d="M0 24 L0 0 L24 0" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/></svg></div>
<div class="corner br"><svg viewBox="0 0 24 24"><path d="M0 24 L0 0 L24 0" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/></svg></div>

<!-- FX Intensity -->
<div id="fx-controls">
    <label>Intensity</label>
    <input type="range" id="intensity" min="0" max="100" value="75">
</div>

<!-- Filter Buttons -->
<div id="ui-container">
    <button class="filter-btn active" data-filter="0">Normal<span class="filter-label">Pass-thru</span></button>
    <button class="filter-btn" data-filter="1">Noir<span class="filter-label">High Contrast</span></button>
    <button class="filter-btn" data-filter="2">Neon<span class="filter-label">Edge Glow</span></button>
    <button class="filter-btn" data-filter="3">Riso<span class="filter-label">Duotone</span></button>
    <button class="filter-btn" data-filter="4">Matrix<span class="filter-label">Phosphor</span></button>
    <button class="filter-btn" data-filter="5">Inferno<span class="filter-label">Thermal</span></button>
    <button class="filter-btn" data-filter="6">Glitch<span class="filter-label">Databend</span></button>
    <button class="filter-btn" data-filter="7">Hologram<span class="filter-label">Scan+3D</span></button>
</div>

<script>
// ─────────────────────────────────────────────
//  1. THREE.JS SETUP
// ─────────────────────────────────────────────
const scene   = new THREE.Scene();
const aspect  = window.innerWidth / window.innerHeight;
const camera  = new THREE.OrthographicCamera(-aspect, aspect, 1, -1, 0.1, 100);
camera.position.z = 1;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const videoEl = document.getElementById('webcam');
const videoTex = new THREE.VideoTexture(videoEl);
videoTex.minFilter = THREE.LinearFilter;
videoTex.magFilter = THREE.LinearFilter;
videoTex.format    = THREE.RGBAFormat;

// Background mesh
const bgGeo  = new THREE.PlaneGeometry(aspect * 2, 2);
const bgMat  = new THREE.MeshBasicMaterial({ map: videoTex });
const bgMesh = new THREE.Mesh(bgGeo, bgMat);
bgMesh.scale.x = -1;
scene.add(bgMesh);

// ─────────────────────────────────────────────
//  2. SHADER PROGRAM
// ─────────────────────────────────────────────
const vertexShader = /* glsl */`
    varying vec2 vUv;
    varying vec2 vScreen;
    void main() {
        vUv = uv;
        vec4 sp = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        vScreen = sp.xy / sp.w * 0.5 + 0.5;
        gl_Position = sp;
    }
`;

const fragmentShader = /* glsl */`
    precision highp float;

    uniform sampler2D tDiffuse;
    uniform int       uFilter;
    uniform float     uTime;
    uniform float     uIntensity;   // 0..1
    uniform vec2      uPortalSize;  // width, height in world units (for 3D effects)

    varying vec2 vUv;
    varying vec2 vScreen;

    // ── helpers ──────────────────────────────
    float luma(vec3 c){ return dot(c, vec3(0.299,0.587,0.114)); }

    // Barrel / spherical distortion
    vec2 fisheye(vec2 uv, float k){
        vec2 d = uv - 0.5;
        float r2 = dot(d,d);
        return uv + d * r2 * k;
    }

    // 3D sphere bulge warp
    vec2 sphereBulge(vec2 uv, float strength){
        vec2 d = uv - 0.5;
        float r = length(d);
        float factor = 1.0 + pow(max(0.0, 1.0 - r*2.0), 2.0) * strength;
        return 0.5 + d / factor;
    }

    // Simple hash noise
    float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453); }
    float noise(vec2 p){
        vec2 i = floor(p); vec2 f = fract(p);
        vec2 u = f*f*(3.0-2.0*f);
        return mix(mix(hash(i), hash(i+vec2(1,0)),u.x),
                   mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),u.x),u.y);
    }

    // Chromatic aberration
    vec3 chromaShift(sampler2D tex, vec2 uv, float amount){
        float r = texture2D(tex, uv + vec2(amount, 0.0)).r;
        float g = texture2D(tex, uv).g;
        float b = texture2D(tex, uv - vec2(amount, 0.0)).b;
        return vec3(r, g, b);
    }

    // Thermal / inferno palette
    vec3 thermal(float t){
        t = clamp(t,0.0,1.0);
        vec3 a = vec3(0.02,0.02,0.02);
        vec3 b = vec3(0.80,0.10,0.00);
        vec3 c = vec3(1.00,0.65,0.00);
        vec3 d = vec3(1.00,1.00,0.85);
        if(t < 0.33) return mix(a, b, t/0.33);
        if(t < 0.66) return mix(b, c, (t-0.33)/0.33);
        return mix(c, d, (t-0.66)/0.34);
    }

    // ── portal edge vignette ─────────────────
    float portalVignette(vec2 uv, float soft){
        vec2 d = abs(uv - 0.5) * 2.0;
        float e = max(d.x, d.y);
        return smoothstep(1.0, 1.0 - soft, e);
    }

    // ── 3D rounded-glass border ──────────────
    vec3 glassBorder(vec2 uv, vec3 col, float radius, vec3 tint, float glow){
        float d = min(min(uv.x, 1.0-uv.x), min(uv.y, 1.0-uv.y));
        float rim = smoothstep(0.0, radius, d);
        float shine = pow(max(0.0, 1.0-rim), 3.0);
        return mix(col + tint * shine * glow, col, rim);
    }

    void main(){
        // Screen sample pos (mirrored x)
        vec2 sp = vec2(1.0 - vScreen.x, vScreen.y);
        // Portal-local UV (for local effects)
        vec2 luv = vUv;

        vec4 color;

        // ── FILTER 0 — NORMAL ──────────────────
        if(uFilter == 0){
            color = texture2D(tDiffuse, sp);
        }

        // ── FILTER 1 — NOIR ───────────────────
        // 3D effect: sphere-warp depth + strong vignette + film grain
        else if(uFilter == 1){
            vec2 warped = sp + (sphereBulge(luv, 0.25 * uIntensity) - luv);
            vec3 raw = chromaShift(tDiffuse, warped, 0.002 * uIntensity);
            float gray = luma(raw);
            // contrast S-curve
            gray = smoothstep(0.05, 0.95, gray);
            gray = gray * 1.3 - 0.15;
            // film grain
            float grain = (hash(luv * 800.0 + uTime * 0.5) - 0.5) * 0.08 * uIntensity;
            gray = clamp(gray + grain, 0.0, 1.0);
            // deep vignette
            float vig = pow(portalVignette(luv, 0.55), 1.6);
            color = vec4(vec3(gray) * vig, 1.0);
        }

        // ── FILTER 2 — NEON WIREFRAME ─────────
        // 3D: thick layered Sobel + colour pulse + depth-pop bloom
        else if(uFilter == 2){
            float off = 0.004 + 0.003 * uIntensity;
            vec4 cL = texture2D(tDiffuse, sp - vec2(off,0));
            vec4 cR = texture2D(tDiffuse, sp + vec2(off,0));
            vec4 cT = texture2D(tDiffuse, sp - vec2(0,off));
            vec4 cB = texture2D(tDiffuse, sp + vec2(0,off));
            // 2-pass Sobel accumulation
            float off2 = off * 2.5;
            vec4 cL2 = texture2D(tDiffuse, sp - vec2(off2,0));
            vec4 cR2 = texture2D(tDiffuse, sp + vec2(off2,0));
            vec4 cT2 = texture2D(tDiffuse, sp - vec2(0,off2));
            vec4 cB2 = texture2D(tDiffuse, sp + vec2(0,off2));
            vec3 edge  = abs(cL.rgb-cR.rgb) + abs(cT.rgb-cB.rgb);
            vec3 edge2 = abs(cL2.rgb-cR2.rgb) + abs(cT2.rgb-cB2.rgb);
            float mag = length(edge) + length(edge2) * 0.5;
            // Animated colour cycle
            float phase = uTime * 0.7;
            vec3 neonA = vec3(0.0,1.0,1.0);                          // cyan
            vec3 neonB = vec3(1.0,0.0,1.0);                          // magenta
            vec3 neonC = vec3(0.0,1.0,0.4);                          // green
            float t = fract(phase * 0.25);
            vec3 neonCol = t < 0.5 ? mix(neonA, neonB, t*2.0) : mix(neonB, neonC, (t-0.5)*2.0);
            // Bloom: add soft glow ring
            float bloom = pow(mag, 0.6) * uIntensity;
            color = vec4(neonCol * bloom * 2.5, 1.0);
        }

        // ── FILTER 3 — RISOGRAPH ──────────────
        // 3D: colour halftone dots + offset CMYK layers + curvature warp
        else if(uFilter == 3){
            // curvature lens
            vec2 w = sp + (fisheye(luv, 0.3 * uIntensity) - luv);
            vec3 raw = texture2D(tDiffuse, w).rgb;
            // Posterise
            float levels = mix(3.0, 6.0, uIntensity);
            raw = floor(raw * levels) / levels;
            // CMYK-like channel separation with offset
            float shift = 0.005 * uIntensity;
            vec3 rCh = texture2D(tDiffuse, w + vec2(shift, 0)).rgb;
            vec3 bCh = texture2D(tDiffuse, w - vec2(shift, 0)).rgb;
            raw = vec3(rCh.r, raw.g, bCh.b);
            // Duotone: shadow -> teal / highlight -> pink
            float l = luma(raw);
            vec3 shadow  = vec3(0.05,0.55,0.65);  // teal
            vec3 hilight = vec3(1.0, 0.25,0.55);  // hot pink
            vec3 duo = mix(shadow, hilight, l);
            // Halftone dots overlay
            vec2 grid = fract(luv * 80.0) - 0.5;
            float dot = smoothstep(0.22 - l*0.12, 0.22 - l*0.12 + 0.05, length(grid));
            duo = mix(duo, duo * 0.4, dot * 0.5 * uIntensity);
            color = vec4(duo, 1.0);
        }

        // ── FILTER 4 — MATRIX ─────────────────
        // 3D: rolling phosphor scan lines + digit rain overlay
        else if(uFilter == 4){
            vec3 raw = texture2D(tDiffuse, sp).rgb;
            float l = luma(raw);
            // Green phosphor
            vec3 phosphor = vec3(0.0, 1.0, 0.2) * l;
            // Scanlines (dense horizontal bands)
            float scan = sin(luv.y * 600.0) * 0.5 + 0.5;
            scan = pow(scan, 1.5);
            phosphor *= mix(0.7, 1.0, scan);
            // Rolling vertical brightness wave (3D depth cue)
            float wave = sin(luv.y * 8.0 - uTime * 3.0) * 0.5 + 0.5;
            phosphor *= mix(0.85, 1.15, wave * uIntensity);
            // Subtle CRT curvature
            vec2 crtUv = luv - 0.5;
            float barrel = dot(crtUv, crtUv) * 0.3 * uIntensity;
            crtUv += crtUv * barrel;
            if(abs(crtUv.x)>0.5 || abs(crtUv.y)>0.5) phosphor = vec3(0.0);
            // Vignette
            phosphor *= portalVignette(luv, 0.4);
            color = vec4(phosphor, 1.0);
        }

        // ── FILTER 5 — INFERNO (THERMAL) ──────
        // 3D: thermal palette + heat shimmer displacement
        else if(uFilter == 5){
            // Heat shimmer: distort sample based on luma gradient
            float shimmerAmp = 0.008 * uIntensity;
            vec2 shimmer = vec2(
                sin(sp.y * 40.0 + uTime * 3.0) * shimmerAmp,
                cos(sp.x * 40.0 + uTime * 2.3) * shimmerAmp * 0.5
            );
            vec3 raw = texture2D(tDiffuse, sp + shimmer).rgb;
            float heat = luma(raw);
            // Edge-enhance to make body heat visible
            float off = 0.003;
            float hL = luma(texture2D(tDiffuse, sp + vec2(-off,0)).rgb);
            float hR = luma(texture2D(tDiffuse, sp + vec2( off,0)).rgb);
            float hT = luma(texture2D(tDiffuse, sp + vec2(0,-off)).rgb);
            float hB = luma(texture2D(tDiffuse, sp + vec2(0, off)).rgb);
            float edgeMag = length(vec2(hR-hL, hB-hT));
            heat = clamp(heat + edgeMag * 1.5 * uIntensity, 0.0, 1.0);
            vec3 thermCol = thermal(heat);
            // add blooming hot spots
            float bloom = pow(heat, 4.0) * uIntensity;
            thermCol += vec3(0.8, 0.5, 0.1) * bloom;
            color = vec4(thermCol, 1.0);
        }

        // ── FILTER 6 — GLITCH / DATABEND ──────
        // 3D: block corruption + channel shift + scanline tears
        else if(uFilter == 6){
            // Block-level glitch offset
            float bSize = 0.06;
            float bRow  = floor(luv.y / bSize);
            float glitchSeed = hash(vec2(bRow, floor(uTime * 8.0)));
            float glitchActive = step(0.82 - uIntensity * 0.3, glitchSeed);
            float xOffset = (glitchSeed - 0.5) * 0.12 * glitchActive * uIntensity;
            // Horizontal tear lines
            float tearLine = step(0.97, hash(vec2(bRow * 3.1, floor(uTime*12.0))));
            float yOffset  = tearLine * (hash(vec2(bRow, uTime)) - 0.5) * 0.04 * uIntensity;
            vec2 gluv = sp + vec2(xOffset, yOffset);
            // Channel separation
            float cShift = 0.012 * uIntensity;
            float r = texture2D(tDiffuse, gluv + vec2( cShift, 0)).r;
            float g = texture2D(tDiffuse, gluv).g;
            float b = texture2D(tDiffuse, gluv - vec2( cShift, 0)).b;
            vec3 raw = vec3(r, g, b);
            // Invert-flash on glitch rows
            if(glitchActive > 0.5 && hash(vec2(bRow*7.3, uTime)) > 0.6){
                raw = 1.0 - raw;
            }
            // Digital noise overlay
            float dnoise = hash(luv * 512.0 + uTime) * 0.15 * glitchActive * uIntensity;
            raw = clamp(raw + dnoise, 0.0, 1.0);
            color = vec4(raw, 1.0);
        }

        // ── FILTER 7 — HOLOGRAM ───────────────
        // 3D: scan bands + transparent overlay + depth parallax + rim light
        else if(uFilter == 7){
            // Holographic parallax — offset sample by 3D surface normal approximation
            vec3 rawNorm = texture2D(tDiffuse, sp).rgb;
            float depth = luma(rawNorm);
            float parallaxStr = 0.018 * uIntensity;
            vec2 parallax = vec2(
                (luv.x - 0.5) * depth * parallaxStr,
                (luv.y - 0.5) * depth * parallaxStr
            );
            vec3 raw = texture2D(tDiffuse, sp + parallax).rgb;
            // Hologram base: desaturate then tint cyan/blue
            float l = luma(raw);
            vec3 holo = mix(vec3(0.0,0.5,1.0), vec3(0.0,1.0,0.85), l);
            holo = mix(raw * 0.2, holo, 0.75);
            // Animated scan bands (fast)
            float bands = sin((luv.y - uTime * 0.6) * 80.0) * 0.5 + 0.5;
            holo *= mix(0.7, 1.15, pow(bands, 3.0));
            // Rim / fresnel glow: brighter at edges of the portal
            float rim = pow(1.0 - portalVignette(luv, 0.7), 2.0) * uIntensity;
            holo += vec3(0.0, 0.8, 1.0) * rim * 0.8;
            // Chromatic fringe
            float fringeAmt = 0.007 * uIntensity;
            vec3 fringe = chromaShift(tDiffuse, sp + parallax, fringeAmt);
            holo = mix(holo, holo + (fringe - luma(fringe)), 0.35);
            // Flicker
            float flicker = 0.95 + sin(uTime * 37.0) * 0.05;
            holo *= flicker;
            color = vec4(holo, 1.0);
        }

        else {
            color = texture2D(tDiffuse, sp);
        }

        // ── UNIVERSAL PORTAL 3D GLASS EDGE ────
        // Rounded glass rim that appears on every filter
        float edgeSoft = 0.07;
        float dist = min(min(luv.x, 1.0-luv.x), min(luv.y, 1.0-luv.y));
        float rim = smoothstep(0.0, edgeSoft, dist);
        // Specular hotspot at top-left (simulates directional light)
        vec2 toLight = normalize(vec2(0.3, 0.7) - luv);
        float spec = pow(max(0.0, 1.0 - length(luv - vec2(0.18, 0.82)) * 3.0), 3.0);
        float rimGlow = (1.0 - rim) * 1.5;
        // Per-filter rim colour hints
        vec3 rimTint = vec3(1.0);
        if(uFilter==2) rimTint = vec3(0.0,1.0,1.0);
        else if(uFilter==3) rimTint = vec3(1.0,0.2,0.7);
        else if(uFilter==4) rimTint = vec3(0.0,1.0,0.2);
        else if(uFilter==5) rimTint = vec3(1.0,0.4,0.0);
        else if(uFilter==6) rimTint = vec3(0.8,0.0,1.0);
        else if(uFilter==7) rimTint = vec3(0.0,0.8,1.0);

        color.rgb += rimTint * rimGlow * 0.45;
        color.rgb += vec3(spec * 0.6);

        // Final vignette
        color.rgb *= mix(0.88, 1.0, portalVignette(luv, 0.3));

        gl_FragColor = color;
    }
`;

const fgMat = new THREE.ShaderMaterial({
    uniforms: {
        tDiffuse:   { value: videoTex },
        uFilter:    { value: 0 },
        uTime:      { value: 0.0 },
        uIntensity: { value: 0.75 },
        uPortalSize:{ value: new THREE.Vector2(1,1) }
    },
    vertexShader,
    fragmentShader,
    transparent: true,
    depthWrite:  false
});

const portalMesh = new THREE.Mesh(new THREE.PlaneGeometry(1,1), fgMat);
portalMesh.visible = false;
portalMesh.position.z = 0.1;
scene.add(portalMesh);

// ─────────────────────────────────────────────
//  3. UI
// ─────────────────────────────────────────────
const statusEl = document.getElementById('status');
const buttons  = document.querySelectorAll('.filter-btn');
const intensitySlider = document.getElementById('intensity');

buttons.forEach(btn => {
    btn.addEventListener('click', e => {
        const t = e.currentTarget;
        buttons.forEach(b => b.classList.remove('active'));
        t.classList.add('active');
        fgMat.uniforms.uFilter.value = parseInt(t.dataset.filter);
    });
});

intensitySlider.addEventListener('input', () => {
    fgMat.uniforms.uIntensity.value = intensitySlider.value / 100;
});

// ─────────────────────────────────────────────
//  4. HAND TRACKING
// ─────────────────────────────────────────────
// Smooth portal position/scale with lerp
const smoothPos   = new THREE.Vector3();
const smoothScale = new THREE.Vector3(1,1,1);
const LRP = 0.18; // lerp factor

function onResults(results) {
    statusEl.innerText = 'Tracking Active — Show Hands';
    statusEl.className = 'active';

    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        portalMesh.visible = true;

        let lp, rp;
        if (results.multiHandLandmarks.length >= 2) {
            statusEl.innerText = '⬤ Portal Active — Both Hands';
            lp = results.multiHandLandmarks[0][8];
            rp = results.multiHandLandmarks[1][8];
        } else {
            statusEl.innerText = '⬤ Portal Active — Pinch Gesture';
            lp = results.multiHandLandmarks[0][4];
            rp = results.multiHandLandmarks[0][8];
        }

        const mx = (x) => -(x - 0.5) * (aspect * 2);
        const my = (y) => -(y - 0.5) * 2;

        const x1 = mx(lp.x), y1 = my(lp.y);
        const x2 = mx(rp.x), y2 = my(rp.y);

        const cx = (x1 + x2) / 2;
        const cy = (y1 + y2) / 2;
        const dx = x2 - x1, dy = y2 - y1;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const pw = dist * 1.6;
        const ph = pw * (9/16);

        // Smooth lerp
        smoothPos.lerp(new THREE.Vector3(cx, cy, 0.1), LRP);
        smoothScale.lerp(new THREE.Vector3(pw, ph, 1), LRP);

        portalMesh.position.copy(smoothPos);
        portalMesh.scale.copy(smoothScale);
        fgMat.uniforms.uPortalSize.value.set(pw, ph);
    } else {
        portalMesh.visible = false;
    }
}

// ─────────────────────────────────────────────
//  5. MEDIAPIPE
// ─────────────────────────────────────────────
const hands = new Hands({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});
hands.setOptions({
    maxNumHands: 2,
    modelComplexity: 1,
    minDetectionConfidence: 0.65,
    minTrackingConfidence: 0.65
});
hands.onResults(onResults);

// ─────────────────────────────────────────────
//  6. RENDER LOOP & CAMERA START
// ─────────────────────────────────────────────
let clock = new THREE.Clock();

const cam = new Camera(videoEl, {
    onFrame: async () => {
        fgMat.uniforms.uTime.value = clock.getElapsedTime();
        await hands.send({ image: videoEl });
        renderer.render(scene, camera);
    },
    width: 1280,
    height: 720
});

cam.start()
    .then(() => { statusEl.innerText = 'Initialising AI Models…'; })
    .catch(() => {
        statusEl.innerText = 'Camera Error — Allow Webcam Access';
        statusEl.className = 'error';
    });

// ─────────────────────────────────────────────
//  7. RESIZE
// ─────────────────────────────────────────────
window.addEventListener('resize', () => {
    const a = window.innerWidth / window.innerHeight;
    camera.left = -a; camera.right = a;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    bgMesh.geometry.dispose();
    bgMesh.geometry = new THREE.PlaneGeometry(a * 2, 2);
});
</script>
</body>
</html>
