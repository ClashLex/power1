<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spatial Portal Filters</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: 'Space Mono', monospace; }
        canvas { display: block; width: 100vw; height: 100vh; }
        video { display: none; }

        #hud-header {
            position: absolute; top: 0; left: 0; right: 0;
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 24px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            z-index: 20; pointer-events: none;
        }
        #hud-title {
            font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 13px;
            letter-spacing: 4px; color: rgba(255,255,255,0.85); text-transform: uppercase;
        }
        #hud-title span { color: #00f5ff; }
        #status {
            font-size: 10px; letter-spacing: 2px;
            color: rgba(255,255,255,0.5); text-transform: uppercase;
        }
        #status.active  { color: #39ff14; }
        #status.capture { color: #00f5ff; }
        #status.locked  { color: #ffd700; }
        #status.error   { color: #ff3939; }

        #ui-container {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; align-items: center; z-index: 20;
        }
        .filter-btn {
            position: relative; background: rgba(0,0,0,0.5); color: rgba(255,255,255,0.65);
            border: 1px solid rgba(255,255,255,0.15); padding: 9px 16px 8px; border-radius: 6px;
            cursor: pointer; font-family: 'Space Mono', monospace; font-size: 9px;
            letter-spacing: 1.5px; text-transform: uppercase; transition: all 0.25s ease;
            backdrop-filter: blur(12px); overflow: hidden;
        }
        .filter-btn::before { content:''; position:absolute; inset:0; background:var(--accent,rgba(255,255,255,0.08)); opacity:0; transition:opacity 0.25s; }
        .filter-btn:hover { color:white; border-color:rgba(255,255,255,0.4); }
        .filter-btn:hover::before { opacity:1; }
        .filter-btn.active { color:white; border-color:var(--active-border,#00f5ff); box-shadow:0 0 16px var(--active-glow,rgba(0,245,255,0.35)),inset 0 0 12px var(--active-glow,rgba(0,245,255,0.1)); }
        .filter-btn.active::before { opacity:1; }
        [data-filter="0"]{ --accent:rgba(255,255,255,0.06); --active-border:rgba(255,255,255,0.6); --active-glow:rgba(255,255,255,0.2); }
        [data-filter="1"]{ --accent:rgba(180,140,80,0.12); --active-border:#d4a843; --active-glow:rgba(212,168,67,0.4); }
        [data-filter="2"]{ --accent:rgba(0,245,255,0.08); --active-border:#00f5ff; --active-glow:rgba(0,245,255,0.4); }
        [data-filter="3"]{ --accent:rgba(255,60,180,0.1); --active-border:#ff3cb4; --active-glow:rgba(255,60,180,0.4); }
        [data-filter="4"]{ --accent:rgba(57,255,20,0.08); --active-border:#39ff14; --active-glow:rgba(57,255,20,0.4); }
        [data-filter="5"]{ --accent:rgba(255,100,0,0.1); --active-border:#ff6400; --active-glow:rgba(255,100,0,0.4); }
        [data-filter="6"]{ --accent:rgba(100,80,255,0.1); --active-border:#7060ff; --active-glow:rgba(112,96,255,0.4); }
        [data-filter="7"]{ --accent:rgba(255,220,0,0.08); --active-border:#ffd700; --active-glow:rgba(255,215,0,0.4); }
        .filter-label { display:block; font-size:7px; letter-spacing:1px; opacity:0.5; margin-top:2px; }

        #fx-controls {
            position: absolute; right: 24px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 20;
        }
        #fx-controls label { font-size:8px; letter-spacing:2px; color:rgba(255,255,255,0.4); text-transform:uppercase; writing-mode:vertical-lr; transform:rotate(180deg); }
        input[type=range] { -webkit-appearance:none; appearance:none; writing-mode:vertical-lr; direction:rtl; width:4px; height:120px; background:rgba(255,255,255,0.1); border-radius:2px; outline:none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:14px; height:14px; border-radius:50%; background:white; cursor:pointer; box-shadow:0 0 8px rgba(255,255,255,0.6); }

        .corner { position:absolute; width:24px; height:24px; z-index:5; pointer-events:none; }
        .corner svg { width:100%; height:100%; }
        .corner.tl { top:14px; left:14px; }
        .corner.tr { top:14px; right:14px; transform:scaleX(-1); }
        .corner.bl { bottom:14px; left:14px; transform:scaleY(-1); }
        .corner.br { bottom:14px; right:14px; transform:scale(-1); }

        /* ── Gesture lock ring ── */
        #gesture-hud {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none; z-index: 30;
        }
        #lock-ring {
            width: 90px; height: 90px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.3s;
        }
        #lock-ring.visible { opacity: 1; }
        #lock-ring svg { width:90px; height:90px; position:absolute; top:0; left:0; }
        #lock-ring-label {
            font-family: 'Orbitron', sans-serif; font-size: 8px; letter-spacing: 2px;
            color: white; text-align: center; position: absolute; bottom: -22px;
            white-space: nowrap; left: 50%; transform: translateX(-50%);
        }

        /* ── Flash overlay ── */
        #flash {
            position: fixed; inset: 0; background: white;
            opacity: 0; pointer-events: none; z-index: 100;
            transition: opacity 0.07s ease-out;
        }
        #flash.pop { opacity: 0.9; }

        /* ── Capture badge ── */
        #capture-badge {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 60px;
            color: white; text-shadow: 0 0 30px rgba(0,245,255,0.9), 0 0 60px rgba(0,245,255,0.5);
            pointer-events: none; z-index: 50; opacity: 0;
        }
        #capture-badge.show { animation: badgePop 0.55s cubic-bezier(0.22,1,0.36,1) forwards; }
        @keyframes badgePop {
            0%   { opacity:1; transform:translate(-50%,-50%) scale(1.6); }
            70%  { opacity:1; transform:translate(-50%,-50%) scale(0.92); }
            100% { opacity:0; transform:translate(-50%,-50%) scale(1); }
        }

        /* ── Photo Gallery ── */
        #gallery {
            position: absolute; left: 18px; top: 70px;
            display: flex; flex-direction: column; gap: 10px;
            z-index: 25;
            max-height: calc(100vh - 150px); overflow: hidden;
        }
        .photo-card {
            position: relative;
            background: #0e0e0e;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 3px;
            padding: 5px 5px 26px 5px;
            box-shadow: 0 6px 28px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.04);
            transform: rotate(var(--tilt,0deg));
            cursor: pointer;
            animation: photoAppear 0.5s cubic-bezier(0.22,1,0.36,1) forwards;
            transition: box-shadow 0.25s;
        }
        @keyframes photoAppear {
            from { transform: scale(0.3) rotate(var(--tilt,0deg)) translateY(30px); opacity:0; }
            to   { transform: scale(1)   rotate(var(--tilt,0deg)) translateY(0);    opacity:1; }
        }
        .photo-card:hover {
            box-shadow: 0 10px 40px rgba(0,0,0,0.9), 0 0 24px rgba(0,245,255,0.18);
            z-index: 30;
        }
        .photo-card img {
            display: block; width: 138px; height: auto;
            border-radius: 1px;
        }
        .photo-meta {
            position: absolute; bottom: 4px; left: 5px; right: 5px;
            font-size: 7px; color: rgba(255,255,255,0.35); letter-spacing: 0.8px;
            display: flex; justify-content: space-between;
        }
        .photo-fist-hint {
            position: absolute; top: 3px; right: 4px;
            font-size: 12px; opacity: 0; transition: opacity 0.2s;
        }
        .photo-card:hover .photo-fist-hint { opacity: 1; }
        .photo-card.deleting {
            animation: photoDelete 0.42s cubic-bezier(0.55,0,1,0.45) forwards !important;
            pointer-events: none;
        }
        @keyframes photoDelete {
            0%   { transform: scale(1) rotate(var(--tilt,0deg)); opacity:1; filter:brightness(1); }
            35%  { transform: scale(1.1) rotate(calc(var(--tilt,0deg)+6deg)); opacity:1; filter:brightness(2.5); }
            100% { transform: scale(0) rotate(calc(var(--tilt,0deg)+25deg)); opacity:0; }
        }

        /* ── Gesture legend ── */
        #gesture-legend {
            position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 22px; z-index: 20; pointer-events: none;
        }
        .gl-item {
            display: flex; align-items: center; gap: 5px;
            font-size: 8px; letter-spacing: 1.5px; color: rgba(255,255,255,0.3);
            text-transform: uppercase;
        }
        .gl-icon { font-size: 13px; }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
</head>
<body>

<video id="webcam" autoplay playsinline></video>
<div id="flash"></div>
<div id="capture-badge"></div>

<div id="hud-header">
    <div id="hud-title">SPATIAL<span>PORTAL</span> / FX ENGINE</div>
    <div id="status">Loading AI Models…</div>
</div>

<div class="corner tl"><svg viewBox="0 0 24 24"><path d="M0 24 L0 0 L24 0" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/></svg></div>
<div class="corner tr"><svg viewBox="0 0 24 24"><path d="M0 24 L0 0 L24 0" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/></svg></div>
<div class="corner bl"><svg viewBox="0 0 24 24"><path d="M0 24 L0 0 L24 0" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/></svg></div>
<div class="corner br"><svg viewBox="0 0 24 24"><path d="M0 24 L0 0 L24 0" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/></svg></div>

<!-- Gesture lock ring (follows portal) -->
<div id="gesture-hud">
    <div id="lock-ring">
        <svg viewBox="0 0 90 90">
            <circle cx="45" cy="45" r="38" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="3.5"/>
            <circle id="lock-progress" cx="45" cy="45" r="38" fill="none" stroke="#00f5ff" stroke-width="3.5"
                    stroke-dasharray="238.76" stroke-dashoffset="238.76"
                    stroke-linecap="round" transform="rotate(-90 45 45)"
                    style="transition:stroke-dashoffset 0.12s linear, stroke 0.3s;"/>
            <text id="lock-icon" x="45" y="50" text-anchor="middle" fill="white"
                  font-family="Orbitron,sans-serif" font-size="18" font-weight="700">✋</text>
        </svg>
        <div id="lock-ring-label">HOLD STILL</div>
    </div>
</div>

<div id="fx-controls">
    <label>Intensity</label>
    <input type="range" id="intensity" min="0" max="100" value="75">
</div>

<div id="ui-container">
    <button class="filter-btn active" data-filter="0">Normal<span class="filter-label">Pass-thru</span></button>
    <button class="filter-btn" data-filter="1">Noir<span class="filter-label">High Contrast</span></button>
    <button class="filter-btn" data-filter="2">Neon<span class="filter-label">Edge Glow</span></button>
    <button class="filter-btn" data-filter="3">Riso<span class="filter-label">Duotone</span></button>
    <button class="filter-btn" data-filter="4">Matrix<span class="filter-label">Phosphor</span></button>
    <button class="filter-btn" data-filter="5">Inferno<span class="filter-label">Thermal</span></button>
    <button class="filter-btn" data-filter="6">Glitch<span class="filter-label">Databend</span></button>
    <button class="filter-btn" data-filter="7">Hologram<span class="filter-label">Scan+3D</span></button>
</div>

<div id="gesture-legend">
    <div class="gl-item"><span class="gl-icon">🤏</span>Pinch = Mini Portal</div>
    <div class="gl-item"><span class="gl-icon">✋✋</span>Both Hands = Big Portal</div>
    <div class="gl-item"><span class="gl-icon">🧊</span>Hold Still = Capture</div>
    <div class="gl-item"><span class="gl-icon">✊</span>Fist Over Photo = Delete</div>
</div>

<div id="gallery"></div>

<script>
// ════════════════════════════════════════════
//  1. THREE.JS SETUP
// ════════════════════════════════════════════
let aspect = window.innerWidth / window.innerHeight;
const scene  = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-aspect, aspect, 1, -1, 0.1, 100);
camera.position.z = 1;

const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const videoEl  = document.getElementById('webcam');
const videoTex = new THREE.VideoTexture(videoEl);
videoTex.minFilter = THREE.LinearFilter;
videoTex.magFilter = THREE.LinearFilter;
videoTex.format    = THREE.RGBAFormat;

const bgGeo  = new THREE.PlaneGeometry(aspect * 2, 2);
const bgMat  = new THREE.MeshBasicMaterial({ map: videoTex });
const bgMesh = new THREE.Mesh(bgGeo, bgMat);
bgMesh.scale.x = -1;
scene.add(bgMesh);

// ════════════════════════════════════════════
//  2. SHADERS
// ════════════════════════════════════════════
const vertexShader = `
    varying vec2 vUv;
    varying vec2 vScreen;
    void main(){
        vUv = uv;
        vec4 sp = projectionMatrix * modelViewMatrix * vec4(position,1.0);
        vScreen = sp.xy/sp.w*0.5+0.5;
        gl_Position = sp;
    }
`;
const fragmentShader = `
    precision highp float;
    uniform sampler2D tDiffuse;
    uniform int   uFilter;
    uniform float uTime;
    uniform float uIntensity;
    uniform float uLocked;
    varying vec2 vUv;
    varying vec2 vScreen;

    float luma(vec3 c){ return dot(c,vec3(0.299,0.587,0.114)); }
    vec2 fisheye(vec2 uv,float k){ vec2 d=uv-0.5; return uv+d*dot(d,d)*k; }
    vec2 sphereBulge(vec2 uv,float s){ vec2 d=uv-0.5; float f=1.0+pow(max(0.0,1.0-length(d)*2.0),2.0)*s; return 0.5+d/f; }
    float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }
    vec3 chromaShift(sampler2D t,vec2 uv,float a){ return vec3(texture2D(t,uv+vec2(a,0)).r,texture2D(t,uv).g,texture2D(t,uv-vec2(a,0)).b); }
    vec3 thermal(float t){ t=clamp(t,0.0,1.0); vec3 a=vec3(.02,.02,.02),b=vec3(.80,.10,.00),c=vec3(1.,.65,.0),d=vec3(1.,1.,.85); if(t<.33)return mix(a,b,t/.33); if(t<.66)return mix(b,c,(t-.33)/.33); return mix(c,d,(t-.66)/.34); }
    float portalVig(vec2 uv,float s){ return smoothstep(1.0,1.0-s,max(abs(uv.x*2.0-1.0),abs(uv.y*2.0-1.0))); }

    void main(){
        vec2 sp  = vec2(1.0-vScreen.x, vScreen.y);
        vec2 luv = vUv;
        vec4 color;

        if(uFilter==0){
            color = texture2D(tDiffuse,sp);
        } else if(uFilter==1){
            vec2 w=sp+(sphereBulge(luv,.25*uIntensity)-luv);
            vec3 raw=chromaShift(tDiffuse,w,.002*uIntensity);
            float g=smoothstep(.05,.95,luma(raw))*1.3-.15;
            g=clamp(g+(hash(luv*800.+uTime*.5)-.5)*.08*uIntensity,0.,1.);
            color=vec4(vec3(g)*pow(portalVig(luv,.55),1.6),1.);
        } else if(uFilter==2){
            float o=.004+.003*uIntensity, o2=o*2.5;
            vec3 e=abs(texture2D(tDiffuse,sp-vec2(o,0)).rgb-texture2D(tDiffuse,sp+vec2(o,0)).rgb)
                  +abs(texture2D(tDiffuse,sp-vec2(0,o)).rgb-texture2D(tDiffuse,sp+vec2(0,o)).rgb);
            vec3 e2=abs(texture2D(tDiffuse,sp-vec2(o2,0)).rgb-texture2D(tDiffuse,sp+vec2(o2,0)).rgb)
                   +abs(texture2D(tDiffuse,sp-vec2(0,o2)).rgb-texture2D(tDiffuse,sp+vec2(0,o2)).rgb);
            float mag=length(e)+length(e2)*.5;
            float t=fract(uTime*.25*.7);
            vec3 nc=t<.5?mix(vec3(0,1,1),vec3(1,0,1),t*2.):mix(vec3(1,0,1),vec3(0,1,.4),(t-.5)*2.);
            color=vec4(nc*pow(mag,.6)*uIntensity*2.5,1.);
        } else if(uFilter==3){
            vec2 w=sp+(fisheye(luv,.3*uIntensity)-luv);
            vec3 raw=floor(texture2D(tDiffuse,w).rgb*mix(3.,6.,uIntensity))/mix(3.,6.,uIntensity);
            float s=.005*uIntensity;
            raw=vec3(texture2D(tDiffuse,w+vec2(s,0)).r,raw.g,texture2D(tDiffuse,w-vec2(s,0)).b);
            float l=luma(raw);
            vec3 duo=mix(vec3(.05,.55,.65),vec3(1.,.25,.55),l);
            float dt=smoothstep(.22-l*.12,.27-l*.12,length(fract(luv*80.)-.5));
            color=vec4(mix(duo,duo*.4,dt*.5*uIntensity),1.);
        } else if(uFilter==4){
            float l=luma(texture2D(tDiffuse,sp).rgb);
            vec3 p=vec3(0,1,.2)*l*mix(.7,1.,pow(sin(luv.y*600.)*.5+.5,1.5));
            p*=mix(.85,1.15,(sin(luv.y*8.-uTime*3.)*.5+.5)*uIntensity);
            vec2 c=luv-.5; float b=dot(c,c)*.3*uIntensity; c+=c*b;
            if(abs(c.x)>.5||abs(c.y)>.5) p=vec3(0.);
            p*=portalVig(luv,.4);
            color=vec4(p,1.);
        } else if(uFilter==5){
            float sa=.008*uIntensity;
            vec3 raw=texture2D(tDiffuse,sp+vec2(sin(sp.y*40.+uTime*3.)*sa,cos(sp.x*40.+uTime*2.3)*sa*.5)).rgb;
            float o=.003;
            float heat=clamp(luma(raw)+length(vec2(luma(texture2D(tDiffuse,sp+vec2(o,0)).rgb)-luma(texture2D(tDiffuse,sp-vec2(o,0)).rgb),luma(texture2D(tDiffuse,sp+vec2(0,o)).rgb)-luma(texture2D(tDiffuse,sp-vec2(0,o)).rgb)))*1.5*uIntensity,0.,1.);
            vec3 tc=thermal(heat)+vec3(.8,.5,.1)*pow(heat,4.)*uIntensity;
            color=vec4(tc,1.);
        } else if(uFilter==6){
            float br=floor(luv.y/.06);
            float gs=hash(vec2(br,floor(uTime*8.)));
            float ga=step(.82-uIntensity*.3,gs);
            vec2 gluv=sp+vec2((gs-.5)*.12*ga*uIntensity,(step(.97,hash(vec2(br*3.1,floor(uTime*12.))))*(hash(vec2(br,uTime))-.5)*.04*uIntensity));
            float cs=.012*uIntensity;
            vec3 raw=vec3(texture2D(tDiffuse,gluv+vec2(cs,0)).r,texture2D(tDiffuse,gluv).g,texture2D(tDiffuse,gluv-vec2(cs,0)).b);
            if(ga>.5&&hash(vec2(br*7.3,uTime))>.6) raw=1.-raw;
            color=vec4(clamp(raw+hash(luv*512.+uTime)*.15*ga*uIntensity,0.,1.),1.);
        } else if(uFilter==7){
            float d=luma(texture2D(tDiffuse,sp).rgb);
            float ps=.018*uIntensity;
            vec2 par=vec2((luv.x-.5)*d*ps,(luv.y-.5)*d*ps);
            vec3 raw=texture2D(tDiffuse,sp+par).rgb;
            float l=luma(raw);
            vec3 h=mix(vec3(0,.5,1),vec3(0,1,.85),l); h=mix(raw*.2,h,.75);
            h*=mix(.7,1.15,pow(sin((luv.y-uTime*.6)*80.)*.5+.5,3.));
            h+=vec3(0,.8,1)*pow(1.-portalVig(luv,.7),2.)*uIntensity*.8;
            h=mix(h,h+(chromaShift(tDiffuse,sp+par,.007*uIntensity)-luma(chromaShift(tDiffuse,sp+par,.007*uIntensity))),.35);
            h*=.95+sin(uTime*37.)*.05;
            color=vec4(h,1.);
        } else {
            color=texture2D(tDiffuse,sp);
        }

        // ── Rim glass edge ──
        float dd=min(min(luv.x,1.-luv.x),min(luv.y,1.-luv.y));
        float rf=smoothstep(0.,.07,dd);
        float rg=(1.-rf)*1.5;
        vec3 rt=vec3(1.);
        if(uFilter==2) rt=vec3(0,1,1);
        else if(uFilter==3) rt=vec3(1,.2,.7);
        else if(uFilter==4) rt=vec3(0,1,.2);
        else if(uFilter==5) rt=vec3(1,.4,0);
        else if(uFilter==6) rt=vec3(.8,0,1);
        else if(uFilter==7) rt=vec3(0,.8,1);

        // Locked: gold pulsing rim
        if(uLocked>.5){
            float p=sin(uTime*8.)*.5+.5;
            rt=mix(vec3(1.,.85,0.),vec3(1.,.4,0.),p);
            rg=(1.-rf)*3.0;
            // Shimmer scan line on locked portal
            float sl=sin(luv.y*180.-uTime*12.)*.5+.5;
            color.rgb=mix(color.rgb,color.rgb*vec3(.8,1.,1.1),sl*.07);
        }

        color.rgb+=rt*rg*.45;
        color.rgb+=vec3(pow(max(0.,1.-length(luv-vec2(.18,.82))*3.),3.)*.6);
        color.rgb*=mix(.88,1.,portalVig(luv,.3));
        gl_FragColor=color;
    }
`;

const fgMat = new THREE.ShaderMaterial({
    uniforms: {
        tDiffuse:    { value: videoTex },
        uFilter:     { value: 0 },
        uTime:       { value: 0.0 },
        uIntensity:  { value: 0.75 },
        uLocked:     { value: 0.0 },
        uPortalSize: { value: new THREE.Vector2(1,1) }
    },
    vertexShader, fragmentShader,
    transparent: true, depthWrite: false
});

const portalMesh = new THREE.Mesh(new THREE.PlaneGeometry(1,1), fgMat);
portalMesh.visible = false;
portalMesh.position.z = 0.1;
scene.add(portalMesh);

// ════════════════════════════════════════════
//  3. DOM REFS & UI
// ════════════════════════════════════════════
const statusEl   = document.getElementById('status');
const flashEl    = document.getElementById('flash');
const badgeEl    = document.getElementById('capture-badge');
const galleryEl  = document.getElementById('gallery');
const lockRingEl = document.getElementById('lock-ring');
const lockProgEl = document.getElementById('lock-progress');
const lockIconEl = document.getElementById('lock-icon');
const lockLabelEl= document.getElementById('lock-ring-label');
const gestureHud = document.getElementById('gesture-hud');
const CIRC       = 238.76;  // 2π × 38 (ring radius)

document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', e => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        e.currentTarget.classList.add('active');
        fgMat.uniforms.uFilter.value = parseInt(e.currentTarget.dataset.filter);
    });
});
document.getElementById('intensity').addEventListener('input', e => {
    fgMat.uniforms.uIntensity.value = e.target.value / 100;
});

// ════════════════════════════════════════════
//  4. CAPTURE SYSTEM
// ════════════════════════════════════════════
const HOLD_MS        = 1800;
const MIN_SIZE       = 0.28;   // world-space width minimum
const MOVE_THRESH    = 0.024;

let captureState = 'idle';  // idle | charging | locked
let chargeStart  = 0;
let lastCx = 0, lastCy = 0;
let portalScrX = 0, portalScrY = 0, portalPxW = 0, portalPxH = 0;
let photoCount = 0;
const TILTS = [-3,-1.5,0,1.5,3,-2.2,2.2,-0.8];
const FILTER_NAMES = ['Normal','Noir','Neon','Riso','Matrix','Inferno','Glitch','Hologram'];

function setProgress(t) {
    lockProgEl.style.strokeDashoffset = CIRC * (1 - t);
}

function triggerCapture() {
    // Flash
    flashEl.classList.add('pop');
    setTimeout(() => flashEl.classList.remove('pop'), 160);
    // Badge
    badgeEl.textContent = '📸';
    badgeEl.classList.remove('show');
    void badgeEl.offsetWidth;
    badgeEl.classList.add('show');

    requestAnimationFrame(() => {
        const gl  = renderer.getContext();
        const dpr = window.devicePixelRatio || 1;

        const left   = Math.round((portalScrX - portalPxW / 2) * dpr);
        const bottom = Math.round(gl.drawingBufferHeight - (portalScrY + portalPxH / 2) * dpr);
        const width  = Math.round(portalPxW * dpr);
        const height = Math.round(portalPxH * dpr);

        const cL = Math.max(0, left);
        const cB = Math.max(0, bottom);
        const cW = Math.min(width,  gl.drawingBufferWidth  - cL);
        const cH = Math.min(height, gl.drawingBufferHeight - cB);
        if (cW <= 0 || cH <= 0) return;

        const pixels = new Uint8Array(cW * cH * 4);
        gl.readPixels(cL, cB, cW, cH, gl.RGBA, gl.UNSIGNED_BYTE, pixels);

        // Flip Y (WebGL origin is bottom-left)
        const offC = document.createElement('canvas');
        offC.width = cW; offC.height = cH;
        const ctx  = offC.getContext('2d');
        const img  = ctx.createImageData(cW, cH);
        for (let y = 0; y < cH; y++) {
            for (let x = 0; x < cW; x++) {
                const src = ((cH - 1 - y) * cW + x) * 4;
                const dst = (y * cW + x) * 4;
                img.data[dst]   = pixels[src];
                img.data[dst+1] = pixels[src+1];
                img.data[dst+2] = pixels[src+2];
                img.data[dst+3] = 255;
            }
        }
        ctx.putImageData(img, 0, 0);
        createPhotoCard(offC.toDataURL('image/png'));
    });
}

function createPhotoCard(dataUrl) {
    photoCount++;
    const tilt       = TILTS[photoCount % TILTS.length];
    const filterName = FILTER_NAMES[fgMat.uniforms.uFilter.value] || '—';
    const ts         = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' });

    const card = document.createElement('div');
    card.className = 'photo-card';
    card.style.setProperty('--tilt', tilt + 'deg');
    card.dataset.id = photoCount;
    card.innerHTML = `
        <img src="${dataUrl}" alt="capture">
        <div class="photo-meta">
            <span>#${String(photoCount).padStart(2,'0')} · ${filterName}</span>
            <span>${ts}</span>
        </div>
        <div class="photo-fist-hint">✊</div>
    `;
    // Click = download
    card.addEventListener('click', () => {
        const a = document.createElement('a');
        a.href = dataUrl;
        a.download = `portal-${photoCount}-${filterName.toLowerCase()}.png`;
        a.click();
    });

    galleryEl.insertBefore(card, galleryEl.firstChild);

    // Trim gallery to 7 cards
    const all = galleryEl.querySelectorAll('.photo-card');
    if (all.length > 7) all[all.length - 1].remove();
}

function deleteCard(card) {
    if (card.classList.contains('deleting')) return;
    card.classList.add('deleting');
    card.addEventListener('animationend', () => card.remove(), { once: true });
}

// ════════════════════════════════════════════
//  5. GESTURE HELPERS
// ════════════════════════════════════════════
function extFingers(lms) {
    const tips = [8, 12, 16, 20];
    const pips = [6, 10, 14, 18];
    let n = 0;
    for (let i = 0; i < 4; i++) if (lms[tips[i]].y < lms[pips[i]].y) n++;
    if (Math.abs(lms[4].x - lms[3].x) > 0.04) n++;
    return n;
}
const isFist = lms => extFingers(lms) <= 1;

const wMX = x => -(x - 0.5) * (aspect * 2);
const wMY = y => -(y - 0.5) * 2;

const smoothPos   = new THREE.Vector3();
const smoothScale = new THREE.Vector3(1, 1, 1);
const LRP = 0.18;

// ════════════════════════════════════════════
//  6. HAND RESULTS — STATE MACHINE
// ════════════════════════════════════════════
function onResults(results) {
    const lms = results.multiHandLandmarks;

    if (!lms || lms.length === 0) {
        portalMesh.visible = false;
        if (captureState !== 'locked') {
            captureState = 'idle';
            fgMat.uniforms.uLocked.value = 0.0;
            lockRingEl.classList.remove('visible');
            setProgress(0);
        }
        statusEl.innerText = 'Tracking Active — Show Hands';
        statusEl.className = 'active';
        return;
    }

    portalMesh.visible = true;

    // Portal anchor points
    let lp, rp;
    if (lms.length >= 2) {
        lp = lms[0][8]; rp = lms[1][8];
    } else {
        lp = lms[0][4]; rp = lms[0][8];
    }

    const x1 = wMX(lp.x), y1 = wMY(lp.y);
    const x2 = wMX(rp.x), y2 = wMY(rp.y);
    const cx = (x1 + x2) / 2, cy = (y1 + y2) / 2;
    const dist = Math.sqrt((x2-x1)**2 + (y2-y1)**2);
    const pw = dist * 1.6, ph = pw * (9/16);

    smoothPos.lerp(new THREE.Vector3(cx, cy, 0.1), LRP);
    smoothScale.lerp(new THREE.Vector3(pw, ph, 1), LRP);
    portalMesh.position.copy(smoothPos);
    portalMesh.scale.copy(smoothScale);
    fgMat.uniforms.uPortalSize.value.set(pw, ph);

    // Convert portal world pos → screen px for capture readback & ring HUD
    const ndcX    = smoothPos.x / aspect;
    const ndcY    = smoothPos.y;
    portalScrX    = ( ndcX * 0.5 + 0.5) * window.innerWidth;
    portalScrY    = (1 - (ndcY * 0.5 + 0.5)) * window.innerHeight;
    portalPxW     = (smoothScale.x / (aspect * 2)) * window.innerWidth;
    portalPxH     = (smoothScale.y / 2)             * window.innerHeight;

    // Move the lock ring to follow the portal centre
    gestureHud.style.left = portalScrX + 'px';
    gestureHud.style.top  = portalScrY + 'px';

    // ── LOCKED STATE ─────────────────────────
    if (captureState === 'locked') {
        fgMat.uniforms.uLocked.value = 1.0;
        statusEl.innerText = '🔒 Locked — ✊ Fist Over Photo = Delete  |  Move to Unlock';
        statusEl.className = 'locked';

        // Detect fist to delete card or to unlock
        let fistDetected = false;
        for (const hand of lms) {
            if (isFist(hand)) {
                fistDetected = true;
                // Palm base (landmark 9) screen position
                const fx = (1 - hand[9].x) * window.innerWidth;
                const fy = hand[9].y        * window.innerHeight;
                let deleted = false;
                galleryEl.querySelectorAll('.photo-card:not(.deleting)').forEach(card => {
                    const r  = card.getBoundingClientRect();
                    const cx = r.left + r.width  / 2;
                    const cy = r.top  + r.height / 2;
                    if (Math.sqrt((fx-cx)**2 + (fy-cy)**2) < 120) {
                        deleteCard(card);
                        deleted = true;
                    }
                });
                if (!deleted) {
                    // Fist not over a card → unlock
                    captureState = 'idle';
                    fgMat.uniforms.uLocked.value = 0.0;
                    lockRingEl.classList.remove('visible');
                    setProgress(0);
                }
            }
        }
        return;
    }

    // ── Portal too small ─────────────────────
    if (pw < MIN_SIZE) {
        captureState = 'idle';
        lockRingEl.classList.remove('visible');
        setProgress(0);
        statusEl.innerText = lms.length >= 2 ? '⬤ Portal Active — Both Hands' : '⬤ Portal Active — Pinch';
        statusEl.className = 'active';
        lastCx = cx; lastCy = cy;
        return;
    }

    // ── Check stillness ──────────────────────
    const moved = Math.sqrt((cx - lastCx)**2 + (cy - lastCy)**2);
    lastCx = cx; lastCy = cy;

    if (moved > MOVE_THRESH) {
        captureState = 'idle';
        chargeStart  = 0;
        lockRingEl.classList.remove('visible');
        setProgress(0);
        lockProgEl.style.stroke = '#00f5ff';
        statusEl.innerText = '⬤ Portal Ready — Hold Still to Capture';
        statusEl.className = 'capture';
        return;
    }

    // ── Still enough → charge ────────────────
    if (captureState === 'idle') {
        captureState = 'charging';
        chargeStart  = performance.now();
        lockRingEl.classList.add('visible');
        lockIconEl.textContent  = '✋';
        lockLabelEl.textContent = 'HOLD STILL';
    }

    if (captureState === 'charging') {
        const t = Math.min((performance.now() - chargeStart) / HOLD_MS, 1.0);
        setProgress(t);
        lockProgEl.style.stroke = `hsl(${Math.round(190 - t * 190)},100%,58%)`;

        const secsLeft = ((1 - t) * HOLD_MS / 1000).toFixed(1);
        statusEl.innerText = `⬤ Hold Still… ${secsLeft}s`;
        statusEl.className = 'capture';

        if (t >= 1.0) {
            // FIRE CAPTURE
            captureState = 'locked';
            fgMat.uniforms.uLocked.value = 1.0;
            lockIconEl.textContent  = '🔒';
            lockLabelEl.textContent = 'CAPTURED!';
            lockProgEl.style.stroke = '#ffd700';
            statusEl.innerText  = '📸 Captured! Click photo to download';
            statusEl.className  = 'locked';
            triggerCapture();
        }
    }
}

// ════════════════════════════════════════════
//  7. MEDIAPIPE
// ════════════════════════════════════════════
const handsMP = new Hands({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});
handsMP.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.65, minTrackingConfidence: 0.65 });
handsMP.onResults(onResults);

// ════════════════════════════════════════════
//  8. RENDER LOOP
// ════════════════════════════════════════════
const clock = new THREE.Clock();
const cam = new Camera(videoEl, {
    onFrame: async () => {
        fgMat.uniforms.uTime.value = clock.getElapsedTime();
        await handsMP.send({ image: videoEl });
        renderer.render(scene, camera);
    },
    width: 1280, height: 720
});
cam.start()
    .then(() => { statusEl.innerText = 'Initialising AI Models…'; })
    .catch(() => { statusEl.innerText = 'Camera Error — Allow Webcam Access'; statusEl.className = 'error'; });

// ════════════════════════════════════════════
//  9. RESIZE
// ════════════════════════════════════════════
window.addEventListener('resize', () => {
    aspect = window.innerWidth / window.innerHeight;
    camera.left = -aspect; camera.right = aspect;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    bgMesh.geometry.dispose();
    bgMesh.geometry = new THREE.PlaneGeometry(aspect * 2, 2);
});
</script>
</body>
</html>
