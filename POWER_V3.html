<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ELEMENTAL POWERS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;overflow:hidden;font-family:'Courier New',monospace;user-select:none}
video{display:none}
canvas{position:fixed;top:0;left:0;transform:scaleX(-1)}

#hud{position:fixed;top:0;left:0;right:0;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;background:linear-gradient(to bottom,rgba(0,0,0,0.8),transparent);z-index:200;pointer-events:none}
#title{font-size:15px;font-weight:700;letter-spacing:7px;color:#fff;text-shadow:0 0 16px rgba(255,255,255,0.5)}
#fps{font-size:10px;letter-spacing:3px;color:rgba(255,255,255,0.4)}

#ppanel{position:fixed;left:14px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:8px;z-index:200}
.pb{width:66px;height:66px;border-radius:13px;border:1.5px solid rgba(255,255,255,0.1);background:rgba(0,0,0,0.8);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;transition:all 0.2s;color:#fff;outline:none;font-family:'Courier New',monospace}
.pb:hover{border-color:rgba(255,255,255,0.3);background:rgba(255,255,255,0.08)}
.pb.on{border-color:rgba(255,255,255,0.45);background:rgba(255,255,255,0.13);transform:scale(1.07);box-shadow:0 0 22px rgba(255,255,255,0.18)}
.pb .ic{font-size:20px;line-height:1}
.pb .lb{font-size:7px;letter-spacing:2px;color:rgba(255,255,255,0.5);text-transform:uppercase;font-weight:700}
.pb.on .lb{color:#fff}

#opanel{position:fixed;right:14px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:8px;z-index:200}
.ob{width:52px;height:52px;border-radius:11px;border:1.5px solid rgba(255,255,255,0.1);background:rgba(0,0,0,0.8);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;transition:all 0.2s;color:#fff;outline:none;font-family:'Courier New',monospace}
.ob:hover{border-color:rgba(255,255,255,0.3);background:rgba(255,255,255,0.08)}
.ob.on{border-color:rgba(255,255,255,0.35);background:rgba(255,255,255,0.1)}
.ob .ic{font-size:17px}
.ob .lb{font-size:7px;letter-spacing:1px;color:rgba(255,255,255,0.5);text-transform:uppercase;font-weight:700}
.ob.on .lb{color:#fff}

#meters{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:flex;gap:26px;z-index:200;pointer-events:none}
.mw{display:flex;flex-direction:column;align-items:center;gap:5px}
.ml{font-size:8px;letter-spacing:2px;color:rgba(255,255,255,0.35)}
.mb{width:108px;height:5px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden}
.mf{height:100%;border-radius:3px;width:0%;transition:width 0.04s}
#fl{background:linear-gradient(to right,#ff4400,#ffcc00)}
#fr{background:linear-gradient(to right,#0066ff,#00ccff)}

#help{position:fixed;bottom:42px;left:50%;transform:translateX(-50%);font-size:10px;color:rgba(255,255,255,0.22);letter-spacing:2px;text-align:center;pointer-events:none;z-index:200;white-space:nowrap}
#pname{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:36px;font-weight:700;letter-spacing:8px;color:#fff;pointer-events:none;z-index:300;opacity:0;transition:opacity 0.12s;text-shadow:0 0 40px rgba(255,255,255,0.8);white-space:nowrap}
#pcnt{position:fixed;top:58px;left:50%;transform:translateX(-50%);font-size:10px;letter-spacing:3px;color:rgba(255,255,255,0.28);z-index:200;pointer-events:none}
#vig{position:fixed;inset:0;pointer-events:none;z-index:100;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,0.65) 100%)}
</style>
</head>
<body>

<div id="hud">
  <div id="title">ELEMENTAL</div>
  <div id="fps">-- FPS</div>
</div>

<div id="ppanel">
  <button class="pb on" id="b-fire_ice"  onclick="setPower('fire_ice')"><span class="ic">🔥❄️</span><span class="lb">DUAL</span></button>
  <button class="pb"    id="b-lightning" onclick="setPower('lightning')"><span class="ic">⚡</span><span class="lb">STORM</span></button>
  <button class="pb"    id="b-red_blue"  onclick="setPower('red_blue')"><span class="ic">🔴🔵</span><span class="lb">AURA</span></button>
  <button class="pb"    id="b-plasma"    onclick="setPower('plasma')"><span class="ic">🌀</span><span class="lb">PLASMA</span></button>
  <button class="pb"    id="b-golden"    onclick="setPower('golden')"><span class="ic">✨</span><span class="lb">DIVINE</span></button>
  <button class="pb"    id="b-void"      onclick="setPower('void')"><span class="ic">🌑</span><span class="lb">VOID</span></button>
</div>

<div id="opanel">
  <button class="ob on" id="o-skeleton" onclick="tog('skeleton')"><span class="ic">🦴</span><span class="lb">BONES</span></button>
  <button class="ob on" id="o-glow"     onclick="tog('glow')"><span class="ic">💡</span><span class="lb">GLOW</span></button>
  <button class="ob on" id="o-trails"   onclick="tog('trails')"><span class="ic">〰️</span><span class="lb">TRAIL</span></button>
  <button class="ob"    id="o-dark"     onclick="tog('dark')"><span class="ic">🌑</span><span class="lb">DARK</span></button>
  <button class="ob"    id="o-mirror"   onclick="tog('mirror')"><span class="ic">🔮</span><span class="lb">FLIP</span></button>
</div>

<div id="meters">
  <div class="mw"><div class="ml">LEFT</div><div class="mb"><div class="mf" id="fl"></div></div></div>
  <div class="mw"><div class="ml">RIGHT</div><div class="mb"><div class="mf" id="fr"></div></div></div>
</div>

<div id="help">1-6 POWER &nbsp;·&nbsp; OPEN HAND EMIT &nbsp;·&nbsp; PINCH DRAW</div>
<div id="pname"></div>
<div id="pcnt"></div>
<div id="vig"></div>

<video id="vid"></video>
<canvas id="cv"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script>
var cv  = document.getElementById('cv');
var ctx = cv.getContext('2d');
var vid = document.getElementById('vid');

var power    = 'fire_ice';
var particles = [];
var bolts     = [];
var trails    = [];

var lightInt  = 0;
var hInt      = [0, 0];
var hSurge    = [0, 0];
var hWasOpen  = [false, false];
var opts      = {skeleton:true, glow:true, trails:true, dark:false, mirror:false};

var pState = {
  L: {frames:0, active:false, lastWrist:null},
  R: {frames:0, active:false, lastWrist:null}
};

var fCount=0, fLast=performance.now();

var CONN = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [5,9],[9,10],[10,11],[11,12],
  [9,13],[13,14],[14,15],[15,16],
  [13,17],[17,18],[18,19],[19,20],[0,17]
];

/* UI */
function setPower(p) {
  power = p;
  document.querySelectorAll('.pb').forEach(function(b){ b.classList.remove('on'); });
  var el = document.getElementById('b-'+p);
  if (el) el.classList.add('on');
  var names = {fire_ice:'DUAL ELEMENT', lightning:'STORM', red_blue:'AURA CLASH', plasma:'PLASMA', golden:'DIVINE', void:'VOID RIFT'};
  var fl = document.getElementById('pname');
  fl.textContent = names[p] || p;
  fl.style.opacity = '1';
  setTimeout(function(){ fl.style.opacity = '0'; }, 800);
}

function tog(key) {
  opts[key] = !opts[key];
  var el = document.getElementById('o-'+key);
  if (el) el.classList.toggle('on', opts[key]);
  if (key === 'mirror') cv.style.transform = opts.mirror ? 'scaleX(1)' : 'scaleX(-1)';
}

document.addEventListener('keydown', function(e) {
  var map = {'1':'fire_ice','2':'lightning','3':'red_blue','4':'plasma','5':'golden','6':'void'};
  if (map[e.key]) setPower(map[e.key]);
  if (e.key==='s') tog('skeleton');
  if (e.key==='g') tog('glow');
  if (e.key==='t') tog('trails');
  if (e.key==='d') tog('dark');
  if (e.key==='m') tog('mirror');
});

/* PARTICLE HELPERS */
function rnd(a, b) { return a + Math.random() * (b - a); }

function addP(x, y, type, draw, surge) {
  var surge = surge || 0;
  var sp = {fire:1, ice:0.7, red:1, blue:0.65, plasma_a:1.3, plasma_b:1.3, golden:0.85, void_p:0.5}[type] || 1;
  particles.push({
    x: x + rnd(-1,1)*(draw?6:12),
    y: y + rnd(-1,1)*(draw?6:12),
    vx: draw ? 0 : rnd(-1,1)*4*sp,
    vy: draw ? 0 : (rnd(-8,-2)*sp - surge*15),
    life: 1.0,
    decay: draw ? 0.005 : rnd(0.05, 0.075),
    size: draw ? rnd(20,42) : rnd(6,24),
    type: type
  });
}

function trySpawn(x, y, type, hi, draw) {
  if (!draw && Math.random() > hInt[hi]) return;
  addP(x, y, type, draw || false, hSurge[hi]);
  if (draw) trails.push({x:x, y:y, type:type, life:1.0});
}

function spawnVoid(x, y) {
  if (Math.random() > hInt[0]) return;
  var a = Math.random()*Math.PI*2;
  var r = rnd(40, 110);
  particles.push({
    x: x + Math.cos(a)*r,
    y: y + Math.sin(a)*r,
    vx: -Math.cos(a)*1.4,
    vy: -Math.sin(a)*1.4,
    life: 1.0, decay: 0.025,
    size: rnd(5,20),
    type: 'void_p',
    tx: x, ty: y
  });
}

function spawnBolt(x, y) {
  if (Math.random() > lightInt) return;
  var path = [];
  var cx=x, cy=y;
  for (var i=0; i<26; i++) {
    path.push({x:cx, y:cy});
    cx += rnd(-1,1)*85;
    cy += rnd(-0.8,0.2)*85;
  }
  var branch = [];
  if (Math.random()<0.3 && path.length>8) {
    var bx=path[7].x, by=path[7].y;
    for (var j=0; j<12; j++) {
      branch.push({x:bx,y:by});
      bx += rnd(-1,1)*55;
      by += rnd(-0.8,0.2)*55;
    }
  }
  bolts.push({path:path, branch:branch, life:1.0, col:(Math.random()>0.5?'#b8e0ff':'#4488ff')});
}

/* GESTURE */
function rawPinch(lm, state) {
  var thumb=lm[4], idx=lm[8], wrist=lm[0];
  var vel = 0;
  if (state.lastWrist) vel = Math.hypot(wrist.x-state.lastWrist.x, wrist.y-state.lastWrist.y);
  state.lastWrist = {x:wrist.x, y:wrist.y};
  if (vel > 0.05) return false;
  var ftips=[12,16,20], fpips=[10,14,18], openC=0;
  for (var i=0; i<3; i++) {
    var t=lm[ftips[i]], p=lm[fpips[i]];
    if (Math.hypot(t.x-wrist.x,t.y-wrist.y) > Math.hypot(p.x-wrist.x,p.y-wrist.y)) openC++;
  }
  if (openC < 2) return false;
  var mid=lm[9];
  var hs = Math.hypot(mid.x-wrist.x, mid.y-wrist.y);
  return Math.hypot(thumb.x-idx.x, thumb.y-idx.y) < hs*0.35;
}

function checkPinch(lm, isRight) {
  var s = isRight ? pState.R : pState.L;
  if (rawPinch(lm, s)) { s.frames=5; s.active=true; }
  else { s.frames--; if (s.frames<=0) s.active=false; }
  return s.active;
}

function handOpen(lm) {
  var o=0, w=lm[0];
  var tips=[8,12,16,20], pips=[6,10,14,18];
  for (var i=0; i<4; i++) {
    if (Math.hypot(lm[tips[i]].x-w.x, lm[tips[i]].y-w.y) > Math.hypot(lm[pips[i]].x-w.x, lm[pips[i]].y-w.y)) o++;
  }
  return o >= 3;
}

/* RENDER PARTICLE */
function drawP(p) {
  var l = p.life;
  var g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
  if (p.type === 'fire') {
    g.addColorStop(0,   'rgba(255,255,200,'+l+')');
    g.addColorStop(0.2, 'rgba(255,180,0,'+(l*0.85)+')');
    g.addColorStop(0.55,'rgba(255,40,0,'+(l*0.45)+')');
    g.addColorStop(1,   'rgba(0,0,0,0)');
  } else if (p.type === 'ice') {
    g.addColorStop(0,   'rgba(255,255,255,'+l+')');
    g.addColorStop(0.3, 'rgba(180,240,255,'+(l*0.8)+')');
    g.addColorStop(0.65,'rgba(0,150,255,'+(l*0.4)+')');
    g.addColorStop(1,   'rgba(0,0,0,0)');
  } else if (p.type === 'red') {
    g.addColorStop(0,   'rgba(255,220,180,'+l+')');
    g.addColorStop(0.3, 'rgba(255,0,0,'+(l*0.8)+')');
    g.addColorStop(0.65,'rgba(100,0,0,'+(l*0.35)+')');
    g.addColorStop(1,   'rgba(0,0,0,0)');
  } else if (p.type === 'blue') {
    g.addColorStop(0,   'rgba(200,220,255,'+l+')');
    g.addColorStop(0.3, 'rgba(0,60,255,'+(l*0.8)+')');
    g.addColorStop(0.65,'rgba(0,0,100,'+(l*0.35)+')');
    g.addColorStop(1,   'rgba(0,0,0,0)');
  } else if (p.type === 'plasma_a') {
    g.addColorStop(0,   'rgba(255,255,255,'+l+')');
    g.addColorStop(0.3, 'rgba(220,0,255,'+(l*0.9)+')');
    g.addColorStop(0.65,'rgba(80,0,180,'+(l*0.4)+')');
    g.addColorStop(1,   'rgba(0,0,0,0)');
  } else if (p.type === 'plasma_b') {
    g.addColorStop(0,   'rgba(255,255,255,'+l+')');
    g.addColorStop(0.3, 'rgba(255,0,180,'+(l*0.9)+')');
    g.addColorStop(0.65,'rgba(180,0,80,'+(l*0.4)+')');
    g.addColorStop(1,   'rgba(0,0,0,0)');
  } else if (p.type === 'golden') {
    g.addColorStop(0,   'rgba(255,255,200,'+l+')');
    g.addColorStop(0.25,'rgba(255,210,0,'+(l*0.9)+')');
    g.addColorStop(0.55,'rgba(255,130,0,'+(l*0.5)+')');
    g.addColorStop(1,   'rgba(0,0,0,0)');
  } else if (p.type === 'void_p') {
    g.addColorStop(0,   'rgba(200,0,255,'+(l*0.9)+')');
    g.addColorStop(0.4, 'rgba(80,0,130,'+(l*0.6)+')');
    g.addColorStop(0.75,'rgba(15,0,35,'+(l*0.3)+')');
    g.addColorStop(1,   'rgba(0,0,0,0)');
  } else {
    g.addColorStop(0, 'rgba(255,255,255,'+l+')');
    g.addColorStop(1, 'rgba(0,0,0,0)');
  }
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
  ctx.fill();
}

/* PALM GLOW */
function drawGlow(lx, ly, isRight, inten) {
  if (!opts.glow || inten < 0.01) return;
  var flk = Math.sin(Date.now()*0.015)*20;
  var rad = 460 + flk;
  var g = ctx.createRadialGradient(lx, ly, 0, lx, ly, rad);
  var c1, c2;
  if (power==='fire_ice') {
    if (isRight) { c1='rgba(100,200,255,'+(0.4*inten)+')'; c2='rgba(0,80,255,'+(0.1*inten)+')'; }
    else         { c1='rgba(255,70,0,'+(0.45*inten)+')';  c2='rgba(255,20,0,'+(0.12*inten)+')'; }
  } else if (power==='lightning') {
    c1='rgba(180,220,255,'+(0.5*inten)+')'; c2='rgba(100,160,255,'+(0.12*inten)+')';
  } else if (power==='red_blue') {
    if (isRight) { c1='rgba(0,0,255,'+(0.42*inten)+')'; c2='rgba(0,30,200,'+(0.1*inten)+')'; }
    else         { c1='rgba(255,0,0,'+(0.45*inten)+')'; c2='rgba(200,0,0,'+(0.1*inten)+')'; }
  } else if (power==='plasma') {
    c1='rgba(200,0,255,'+(0.5*inten)+')'; c2='rgba(100,0,180,'+(0.14*inten)+')';
  } else if (power==='golden') {
    c1='rgba(255,220,0,'+(0.55*inten)+')'; c2='rgba(255,150,0,'+(0.18*inten)+')';
  } else if (power==='void') {
    c1='rgba(100,0,200,'+(0.5*inten)+')'; c2='rgba(40,0,80,'+(0.15*inten)+')';
  } else {
    c1='rgba(200,200,255,'+(0.4*inten)+')'; c2='rgba(100,100,200,'+(0.1*inten)+')';
  }
  g.addColorStop(0, c1);
  g.addColorStop(0.5, c2);
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, cv.width, cv.height);
  ctx.restore();
}

/* SKELETON */
function drawSkeleton(lm, isRight, inten) {
  if (!opts.skeleton || inten < 0.05) return;
  var cols = {fire_ice:isRight?'#00ccff':'#ff6600', lightning:'#aaddff', red_blue:isRight?'#4466ff':'#ff2200', plasma:'#dd00ff', golden:'#ffd700', void:'#9900cc'};
  var col = cols[power] || '#ffffff';
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  ctx.globalAlpha = 0.4 * inten;
  ctx.strokeStyle = col;
  ctx.lineWidth = 1.5;
  ctx.shadowBlur = 8;
  ctx.shadowColor = col;
  for (var c=0; c<CONN.length; c++) {
    var a=lm[CONN[c][0]], b=lm[CONN[c][1]];
    ctx.beginPath();
    ctx.moveTo(a.x*cv.width, a.y*cv.height);
    ctx.lineTo(b.x*cv.width, b.y*cv.height);
    ctx.stroke();
  }
  for (var d=0; d<lm.length; d++) {
    var tip = [4,8,12,16,20].indexOf(d) !== -1;
    ctx.beginPath();
    ctx.arc(lm[d].x*cv.width, lm[d].y*cv.height, tip?4:2, 0, Math.PI*2);
    ctx.fillStyle = tip ? '#fff' : col;
    ctx.globalAlpha = 0.5 * inten;
    ctx.fill();
  }
  ctx.restore();
}

/* BOLT DRAW */
function drawBoltPath(path, col, life) {
  if (path.length < 2) return;
  ctx.beginPath();
  ctx.moveTo(path[0].x, path[0].y);
  for (var i=1; i<path.length; i++) ctx.lineTo(path[i].x, path[i].y);
  ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.strokeStyle=col; ctx.lineWidth=20; ctx.globalAlpha=life*0.24; ctx.shadowBlur=28; ctx.shadowColor=col; ctx.stroke(); ctx.restore();
  ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.strokeStyle=col; ctx.lineWidth=6;  ctx.globalAlpha=life*0.6;  ctx.stroke(); ctx.restore();
  ctx.save(); ctx.globalCompositeOperation='source-over'; ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.globalAlpha=life; ctx.stroke(); ctx.restore();
}

/* TRAILS */
function drawTrails() {
  if (!opts.trails || trails.length < 2) return;
  var tcols = {fire:'255,120,0', ice:'100,200,255', red:'255,0,0', blue:'0,100,255', plasma_a:'200,0,255', plasma_b:'255,0,180', golden:'255,200,0', void_p:'100,0,200'};
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  for (var i=1; i<trails.length; i++) {
    var a=trails[i-1], b=trails[i];
    if (a.type !== b.type) continue;
    var c = tcols[a.type] || '255,255,255';
    ctx.beginPath();
    ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = 'rgba('+c+','+(a.life*0.3)+')';
    ctx.lineWidth = a.life * 5;
    ctx.lineCap = 'round';
    ctx.stroke();
  }
  ctx.restore();
}

/* MAIN RESULTS */
function onResults(results) {
  cv.width  = window.innerWidth;
  cv.height = window.innerHeight;

  fCount++;
  var now = performance.now();
  if (now - fLast > 700) {
    var fps = Math.round(fCount / ((now - fLast) / 1000));
    fCount = 0; fLast = now;
    document.getElementById('fps').textContent = fps + ' FPS';
  }

  ctx.save();
  ctx.clearRect(0, 0, cv.width, cv.height);

  if (!opts.dark) {
    ctx.drawImage(results.image, 0, 0, cv.width, cv.height);
    ctx.save();
    ctx.globalCompositeOperation = 'multiply';
    ctx.fillStyle = 'rgba(6,3,1,0.52)';
    ctx.fillRect(0, 0, cv.width, cv.height);
    ctx.restore();
  } else {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, cv.width, cv.height);
  }

  /* decay trails */
  var tAlive = [];
  for (var t=0; t<trails.length; t++) { trails[t].life -= 0.022; if (trails[t].life > 0) tAlive.push(trails[t]); }
  trails = tAlive;
  drawTrails();

  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {

    var anyOpen = false;
    for (var h=0; h<results.multiHandLandmarks.length; h++) {
      if (handOpen(results.multiHandLandmarks[h])) { anyOpen = true; break; }
    }

    /* lightning ramp */
    if (power === 'lightning') lightInt += anyOpen ? 0.08 : -0.07;
    else lightInt -= 0.07;
    if (lightInt < 0) lightInt = 0;
    if (lightInt > 1) lightInt = 1;

    /* lightning flash */
    if (lightInt > 0.01 && Math.random() < 0.4*lightInt) {
      ctx.save();
      ctx.globalCompositeOperation = 'screen';
      ctx.fillStyle = 'rgba(200,220,255,'+(0.2*lightInt)+')';
      ctx.fillRect(0, 0, cv.width, cv.height);
      ctx.restore();
    }

    /* spawn bolts */
    if (power === 'lightning') {
      for (var h=0; h<results.multiHandLandmarks.length; h++) {
        var lm = results.multiHandLandmarks[h];
        if (!handOpen(lm)) continue;
        var tips = [4,8,12,16,20];
        for (var ti=0; ti<tips.length; ti++) {
          if (Math.random() < 0.07) spawnBolt(lm[tips[ti]].x*cv.width, lm[tips[ti]].y*cv.height);
        }
        for (var ci=0; ci<CONN.length; ci++) {
          if (Math.random() < 0.005) spawnBolt(lm[CONN[ci][0]].x*cv.width, lm[CONN[ci][0]].y*cv.height);
        }
      }
    }

    /* per hand */
    for (var h=0; h<results.multiHandLandmarks.length; h++) {
      var lm     = results.multiHandLandmarks[h];
      var label  = results.multiHandedness[h].label;
      var isRight= label === 'Right';
      var hi     = isRight ? 1 : 0;
      var open   = handOpen(lm);
      var pinch  = checkPinch(lm, isRight);
      var active = open || pinch;

      if (power !== 'lightning') {
        hInt[hi] += active ? 0.06 : -0.13;
        if (open && !hWasOpen[hi]) hSurge[hi] = 1.0;
      } else {
        hInt[hi] -= 0.13;
      }
      hWasOpen[hi] = open;
      hSurge[hi] *= 0.92;
      if (hSurge[hi] < 0.01) hSurge[hi] = 0;
      if (hInt[hi] < 0) hInt[hi] = 0;
      if (hInt[hi] > 1) hInt[hi] = 1;

      var inten = hInt[hi];
      drawSkeleton(lm, isRight, inten);
      if (inten < 0.01) continue;

      var palm = lm[9];
      var lx = palm.x * cv.width;
      var ly = palm.y * cv.height;
      drawGlow(lx, ly, isRight, inten);

      /* pinch draw */
      if (pinch) {
        var tx = ((lm[8].x + lm[4].x) / 2) * cv.width;
        var ty = ((lm[8].y + lm[4].y) / 2) * cv.height;
        if (power==='fire_ice') trySpawn(tx, ty, isRight?'ice':'fire', hi, true);
        if (power==='red_blue') trySpawn(tx, ty, isRight?'blue':'red', hi, true);
        if (power==='plasma')  { addP(tx, ty, isRight?'plasma_b':'plasma_a', true, hSurge[hi]); trails.push({x:tx,y:ty,type:isRight?'plasma_b':'plasma_a',life:1}); }
        if (power==='golden')  { addP(tx, ty, 'golden', true, hSurge[hi]); trails.push({x:tx,y:ty,type:'golden',life:1}); }
      }

      /* spawn at landmarks */
      for (var li=0; li<lm.length; li++) {
        var px=lm[li].x*cv.width, py=lm[li].y*cv.height;
        spawnForPower(px, py, isRight, hi);
      }
      for (var ci=0; ci<CONN.length; ci++) {
        var ca=lm[CONN[ci][0]], cb=lm[CONN[ci][1]];
        spawnForPower(((ca.x+cb.x)/2)*cv.width, ((ca.y+cb.y)/2)*cv.height, isRight, hi);
      }
    }

  } else {
    hInt[0] -= 0.1; hInt[1] -= 0.1;
    if (hInt[0]<0) hInt[0]=0; if (hInt[1]<0) hInt[1]=0;
    lightInt -= 0.07; if (lightInt<0) lightInt=0;
  }

  /* render particles */
  ctx.globalCompositeOperation = 'lighter';
  var pAlive = [];
  for (var pi=0; pi<particles.length; pi++) {
    var p = particles[pi];
    p.x += p.vx; p.y += p.vy;
    if (p.type==='void_p' && p.tx !== undefined) {
      var dx=p.tx-p.x, dy=p.ty-p.y, dd=Math.hypot(dx,dy);
      if (dd > 4) { p.vx += dx/dd*0.35; p.vy += dy/dd*0.35; }
    }
    p.life -= p.decay;
    if (p.life > 0) { drawP(p); pAlive.push(p); }
  }
  particles = pAlive;

  /* render bolts */
  var bAlive = [];
  for (var bi=0; bi<bolts.length; bi++) {
    var b = bolts[bi];
    b.life -= 0.1;
    if (b.life <= 0) continue;
    drawBoltPath(b.path, b.col, b.life);
    if (b.branch.length > 0) drawBoltPath(b.branch, b.col, b.life*0.6);
    bAlive.push(b);
  }
  bolts = bAlive;

  ctx.restore();

  document.getElementById('fl').style.width = (hInt[0]*100) + '%';
  document.getElementById('fr').style.width = (hInt[1]*100) + '%';
  var pc = particles.length;
  document.getElementById('pcnt').textContent = pc > 30 ? pc + ' PARTICLES' : '';
}

function spawnForPower(x, y, isRight, hi) {
  if (power==='fire_ice')  trySpawn(x, y, isRight?'ice':'fire', hi);
  else if (power==='red_blue') trySpawn(x, y, isRight?'blue':'red', hi);
  else if (power==='plasma')   { if (Math.random()<hInt[hi]) addP(x,y,isRight?'plasma_b':'plasma_a',false,hSurge[hi]); }
  else if (power==='golden')   { if (Math.random()<hInt[hi]) addP(x,y,'golden',false,hSurge[hi]); }
  else if (power==='void')     spawnVoid(x, y);
}

/* MEDIAPIPE */
var hands = new Hands({
  locateFile: function(f){ return 'https://cdn.jsdelivr.net/npm/@mediapipe/hands/'+f; }
});
hands.setOptions({
  maxNumHands: 2,
  modelComplexity: 1,
  minDetectionConfidence: 0.65,
  minTrackingConfidence: 0.65
});
hands.onResults(onResults);

var camera = new Camera(vid, {
  onFrame: async function(){ await hands.send({image:vid}); },
  width: 1280,
  height: 720
});
camera.start();
</script>
